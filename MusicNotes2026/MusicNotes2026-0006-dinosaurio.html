<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas Staff Composer</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      background: #bbeeff;
    }

    #rename-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.18);
      z-index: 10;
      font-family: Chicago, Geneva, sans-serif;
    }

    #rename-modal.visible {
      display: flex;
    }

    #rename-dialog {
      width: 320px;
      background: #f2f2f2;
      border: 2px solid #000;
      box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.55);
      padding: 16px;
    }

    #rename-dialog label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
    }

    #rename-input {
      width: 100%;
      box-sizing: border-box;
      border: 2px inset #fff;
      font: 16px Chicago, Geneva, sans-serif;
      padding: 5px;
      margin-bottom: 14px;
    }

    #rename-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    #rename-buttons button {
      min-width: 72px;
      border: 2px outset #fff;
      background: #ddd;
      font: 13px Chicago, Geneva, sans-serif;
      padding: 4px 12px;
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>
  <input
    id="import-file"
    type="file"
    accept=".musicxml,.xml,.mid,.midi,audio/midi,text/xml,application/xml"
    style="display:none"
  />
  <div id="rename-modal" aria-hidden="true">
    <div id="rename-dialog" role="dialog" aria-modal="true" aria-labelledby="rename-label">
      <label id="rename-label" for="rename-input">Rename staff</label>
      <input id="rename-input" type="text" />
      <div id="rename-buttons">
        <button id="rename-ok" type="button">OK</button>
        <button id="rename-cancel" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <script src="vendor/vexflow-4.2.2.js"></script>
  <script>
    const canvas = document.getElementById("canvas");
    const importFileInput = document.getElementById("import-file");
    const renameModal = document.getElementById("rename-modal");
    const renameInput = document.getElementById("rename-input");
    const renameOkButton = document.getElementById("rename-ok");
    const renameCancelButton = document.getElementById("rename-cancel");
    const ctx = canvas.getContext("2d");
    const VF = window.Vex?.Flow;
    const vexContext = VF ? new VF.CanvasContext(ctx) : null;



    const AppState = {
      notes: [],
      nextId: 1,
      nextBeamGroupId: 1,
      beamEdits: {},
      beamRender: new Map(),
      selectedBeamGroupId: null,
      minusActive: false,
      playback: {
        enabled: false,
        playing: false
      },
      staves: [
        { id: "staff-1", name: "Staff 1" }
      ],
      modal: {
        type: null,
        staffId: null
      },
      undoStack: [],
      cursorIndex: 0,
      cursorStaffOffset: 0,
      cursorBlinkStart: performance.now(),
      lastFrameTime: performance.now(),
      selection: null,

      menu: {
        open: null,
        submenu: null,
        hoverId: null,
        itemRects: []
      },

      tutorial: {
        enabled: false,
        hoverId: null,
        hoverText: "",
        hoverStartedAt: 0,
        delayMs: 650
      },

      notification: {
        text: "",
        startedAt: 0,
        durationMs: 2600
      },

      welcome: {
        startedAt: performance.now(),
        fadeStartMs: 1500,
        fadeEndMs: 1700,
        imageLoaded: false,
        imageFailed: false
      },

      tableScroll: {
        y: 0,
        velocity: 0
      },

      tonicGuideAnimation: {
        fromY: null,
        toY: null,
        displayY: null,
        startedAt: 0,
        duration: 400
      },

      camera: {
        x: 0,
        zoom: 1,
        velocityX: 0,
        momentum: false,
        followX: 0,
        followVelocityX: 0
      },

      input: {
        down: false,
        pointerId: null,
        startX: 0,
        startY: 0,
        lastX: 0,
        lastY: 0,
        lastTime: 0,
        dragging: false,
        didLongPress: false,
        longPressTimer: null,
        activeSliderId: null,
        activeBeamDrag: null
      },

      cursorBezier: {
        wideCenterRatio: 1 / 10,
        bustSizeRatio: 1 / 20,
        midriffRatio: 1 / 30,
        neckCircumferenceRatio: 1 / 40
      },

      controls: {
        noteheadDiameterScale: 1
      },

      pinch: {
        active: false,
        pointers: new Map(),
        startDistance: 1,
        startZoom: 1,
        centerScreenX: 0,
        centerWorldX: 0
      },

      noteInput: {
        tonicLetter: "C",
        tonicOctave: 4,
        accidental: "natural",
        selectedAccidental: "natural",
        value: "1/4",
        shift: false,
        selectedShift: false,
        tonicMenuOpen: false
      },

      canvasMenu: {
        visible: false,
        x: 0,
        y: 0,
        noteId: null
      },

      hover: {
        noteId: null,
        chordX: null,
        startedAt: 0,
        sx: null,
        sy: null,
        shiftChord: false
      }
    };

    const welcomeImage = typeof Image !== "undefined"
      ? new Image()
      : null;

    if (welcomeImage) {
      welcomeImage.onload = () => {
        AppState.welcome.imageLoaded = true;
      };
      welcomeImage.onerror = () => {
        AppState.welcome.imageFailed = true;
      };
      welcomeImage.src = "welcome_screen.png";
    }

    const Layout = {
      S: 18,
      staff: {},
      table: { scrollY: 0 },
      inputPanel: {},
      keypad: {},
      sidePanel: {},

      update() {
        const bottomH = canvas.height * 0.48;
        const topH = canvas.height - bottomH;
        const padSize = Math.min(bottomH * 0.68, canvas.width * 0.42);
        //const padSize = Math.min(bottomH * 0.82, canvas.width * 0.42);

        this.staff = {
          x: 0,
          y: 0,
          w: canvas.width,
          h: topH * 0.58
        };

        this.table = {
          x: 0,
          y: this.staff.h,
          w: canvas.width,
          h: canvas.height - this.staff.h,
          scrollY: this.table.scrollY || 0
        };

        this.inputPanel = {
          x: 0,
          y: topH,
          w: canvas.width,
          h: bottomH
        };

        this.keypad = {
          x: canvas.width - padSize - 20,
          y: topH + 20,
          w: padSize,
          h: padSize
        };

        this.sidePanel = {
          x: 20,
          y: topH + 20,
          w: Math.max(160, this.keypad.x - 50),
          h: bottomH - 40
        };
      },

      staffTop() {
        return 110;
      },

      lineY(i) {
        return this.staffTop() + i * this.S;
      },

      bottomLineY() {
        return this.lineY(4);
      }
    };

    const Notes = {
      letters: ["C", "D", "E", "F", "G", "A", "B"],
      minTonicOctave: -1,
      maxTonicOctave: 9,

      accidentalSymbol: {
        "double-flat": "𝄫",
        flat: "♭",
        natural: "♮",
        sharp: "♯",
        "double-sharp": "𝄪"
      },

      keySignatureSymbol: {
        sharp: "♯",
        flat: "♭"
      },

      keySignatureLines: {
        sharp: [0, 3, -0.5, 2.5, 5.5, 1.5, 4.5],
        flat: [4, 1, 4.5, 1.5, 5, 2, 5.5]
      },

      keySignaturePitches: {
        sharp: [
          ["F", 5],
          ["C", 5],
          ["G", 5],
          ["D", 5],
          ["A", 4],
          ["E", 5],
          ["B", 4]
        ],
        flat: [
          ["B", 4],
          ["E", 5],
          ["A", 4],
          ["D", 5],
          ["G", 4],
          ["C", 5],
          ["F", 4]
        ]
      },

      accidentalOffset: {
        "double-flat": -2,
        flat: -1,
        natural: 0,
        sharp: 1,
        "double-sharp": 2
      },

      offsetAccidental: {
        "-2": "double-flat",
        "-1": "flat",
        0: "natural",
        1: "sharp",
        2: "double-sharp"
      },

      midiBase: {
        C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11
      },

      snapshot() {
        return {
          notes: AppState.notes.map(note => ({ ...note })),
          nextId: AppState.nextId,
          nextBeamGroupId: AppState.nextBeamGroupId,
          beamEdits: Object.fromEntries(
            Object.entries(AppState.beamEdits).map(([id, edit]) => [
              id,
              { ...edit }
            ])
          ),
          cursorIndex: AppState.cursorIndex,
          cursorStaffOffset: AppState.cursorStaffOffset,
          selection: AppState.selection ? { ...AppState.selection } : null,
          noteInput: { ...AppState.noteInput }
        };
      },

      saveUndo() {
        AppState.undoStack.push(this.snapshot());

        if (AppState.undoStack.length > 100) {
          AppState.undoStack.shift();
        }
      },

      undo() {
        const previous = AppState.undoStack.pop();
        if (!previous) return;

        AppState.notes = previous.notes.map(note => ({ ...note }));
        AppState.nextId = previous.nextId;
        AppState.nextBeamGroupId = previous.nextBeamGroupId ?? AppState.nextBeamGroupId;
        AppState.beamEdits = previous.beamEdits
          ? Object.fromEntries(
            Object.entries(previous.beamEdits).map(([id, edit]) => [
              id,
              { ...edit }
            ])
          )
          : {};
        AppState.cursorIndex = previous.cursorIndex;
        AppState.cursorStaffOffset = previous.cursorStaffOffset;
        AppState.selection = previous.selection ? { ...previous.selection } : null;
        AppState.noteInput = {
          ...AppState.noteInput,
          ...previous.noteInput,
          shift: Input.heldShiftKeys.size > 0
            ? true
            : previous.noteInput.selectedShift
        };

        this.layout();
        this.refreshAccidentalDisplay();
        this.resetCursorBlink();
      },

      setTonicOctave(octave) {
        AppState.noteInput.tonicOctave = Math.max(
          this.minTonicOctave,
          Math.min(this.maxTonicOctave, octave)
        );
      },

      changeTonicOctave(octave) {
        const nextOctave = Math.max(
          this.minTonicOctave,
          Math.min(this.maxTonicOctave, octave)
        );

        if (nextOctave === AppState.noteInput.tonicOctave) return;

        this.saveUndo();
        AppState.noteInput.tonicOctave = nextOctave;
      },

      changeTonicLetter(letter) {
        if (!this.letters.includes(letter)) return;
        if (letter === AppState.noteInput.tonicLetter) return;

        this.saveUndo();
        AppState.noteInput.tonicLetter = letter;
      },

      ordered() {
        return [...AppState.notes].sort((a, b) => {
          if (a.x !== b.x) return a.x - b.x;
          return (a.y ?? 0) - (b.y ?? 0);
        });
      },

      letterIndex(letter) {
        return this.letters.indexOf(letter);
      },

      diatonicStep(letter, octave) {
        return (octave - 4) * 7 + this.letterIndex(letter);
      },

      yFromPitch(letter, octave) {
        // Treble clef: E4 is the bottom staff line.
        const e4Step = this.diatonicStep("E", 4);
        const noteStep = this.diatonicStep(letter, octave);

        return Layout.bottomLineY() - (noteStep - e4Step) * (Layout.S / 2);
      },

      pitchFromDegree(degree) {
        const tonicIndex =
          this.letterIndex(AppState.noteInput.tonicLetter);

        const absolute =
          tonicIndex + (degree - 1);

        const letter =
          this.letters[absolute % 7];

        const octave =
          AppState.noteInput.tonicOctave +
          Math.floor(absolute / 7);

        return { letter, octave };
      },

      stepTonic(delta) {
        const currentIndex = this.letterIndex(AppState.noteInput.tonicLetter);
        if (currentIndex < 0) return;

        let nextIndex = currentIndex + delta;
        let nextOctave = AppState.noteInput.tonicOctave;

        if (nextIndex < 0) {
          if (nextOctave <= this.minTonicOctave) return;
          nextIndex = this.letters.length - 1;
          nextOctave -= 1;
        } else if (nextIndex >= this.letters.length) {
          if (nextOctave >= this.maxTonicOctave) return;
          nextIndex = 0;
          nextOctave += 1;
        }

        this.saveUndo();
        AppState.noteInput.tonicLetter = this.letters[nextIndex];
        AppState.noteInput.tonicOctave = nextOctave;
      },

      stepTonicOctave(delta) {
        const currentOctave = AppState.noteInput.tonicOctave;
        const nextOctave = Math.max(
          this.minTonicOctave,
          Math.min(this.maxTonicOctave, currentOctave + delta)
        );

        if (nextOctave === currentOctave) return;

        this.saveUndo();
        AppState.noteInput.tonicOctave = nextOctave;
      },

      setTonicFromDiatonicStep(step) {
        const index =
          ((step % this.letters.length) + this.letters.length) %
          this.letters.length;

        AppState.noteInput.tonicLetter = this.letters[index];
        AppState.noteInput.tonicOctave =
          4 + Math.floor(step / this.letters.length);
      },

      transposeTonicByInterval(degree, negative = false) {
        const safeDegree = Math.max(1, Math.min(9, degree));
        const currentStep = this.diatonicStep(
          AppState.noteInput.tonicLetter,
          AppState.noteInput.tonicOctave
        );
        const delta = (safeDegree - 1) * (negative ? -1 : 1);

        this.saveUndo();
        this.setTonicFromDiatonicStep(currentStep + delta);
      },

      create({ x, letter, octave, accidental, showAccidental, staff = 0 }) {
        return {
          id: AppState.nextId++,
          kind: "note",
          x,
          layoutX: x,
          drawX: x,
          letter,
          octave,
          y: this.yFromPitch(letter, octave),
          staff,
          accidental,
          showAccidental,
          value: AppState.noteInput.value
        };
      },

      keySignatureAt(x) {
        const keySignatures = this.ordered()
          .filter(item => item.kind === "keysig" && item.x <= x);

        return keySignatures[keySignatures.length - 1] || null;
      },

      keySignatureOffsetForLetter(keySignature, letter) {
        if (!keySignature || keySignature.count === 0) return 0;

        const pitches = this.keySignaturePitches[keySignature.accidental] || [];
        const affectedLetters = pitches
          .slice(0, keySignature.count)
          .map(([pitchLetter]) => pitchLetter);

        if (!affectedLetters.includes(letter)) return 0;

        return keySignature.accidental === "flat" ? -1 : 1;
      },

      accidentalContextStartX(x) {
        const boundaries = this.ordered()
          .filter(item =>
            (item.kind === "barline" || item.kind === "keysig") &&
            item.x <= x
          );
        const previousBoundary = boundaries[boundaries.length - 1];

        return previousBoundary ? previousBoundary.x : Number.NEGATIVE_INFINITY;
      },

      prevailingAccidentalOffset(letter, octave, staff, x) {
        const startX = this.accidentalContextStartX(x);
        const previousNotes = this.ordered()
          .filter(item =>
            item.kind === "note" &&
            item.x >= startX &&
            item.x < x &&
            item.letter === letter &&
            item.octave === octave &&
            (item.staff ?? 0) === staff &&
            item.showAccidental
          );
        const previousNote = previousNotes[previousNotes.length - 1];

        return previousNote
          ? this.accidentalOffset[previousNote.accidental] ?? 0
          : null;
      },

      effectiveAccidental(letter, octave, staff, x, selectedAccidental) {
        const keySignatureOffset = this.keySignatureOffsetForLetter(
          this.keySignatureAt(x),
          letter
        );
        const selectedOffset = this.accidentalOffset[selectedAccidental] ?? 0;
        const prevailingOffset = this.prevailingAccidentalOffset(
          letter,
          octave,
          staff,
          x
        );
        const baseOffset = selectedOffset === 0 && prevailingOffset !== null
          ? prevailingOffset
          : keySignatureOffset;
        const effectiveOffset = Math.max(
          -2,
          Math.min(2, baseOffset + selectedOffset)
        );

        return {
          accidental: this.offsetAccidental[effectiveOffset],
          showAccidental: selectedOffset !== 0
        };
      },

      refreshAccidentalDisplay() {
        let activeKeySignature = null;
        const prevailing = new Map();

        for (const item of this.ordered()) {
          if (item.kind === "barline") {
            prevailing.clear();
            continue;
          }

          if (item.kind === "keysig") {
            activeKeySignature = item;
            prevailing.clear();
            continue;
          }

          if (item.kind !== "note") continue;

          const key = `${item.letter}:${item.octave}:${item.staff ?? 0}`;
          const keySignatureOffset = this.keySignatureOffsetForLetter(
            activeKeySignature,
            item.letter
          );
          const noteOffset = this.accidentalOffset[item.accidental] ?? 0;
          const previousOffset = prevailing.has(key)
            ? prevailing.get(key)
            : keySignatureOffset;

          item.showAccidental = noteOffset !== previousOffset;

          if (item.showAccidental) {
            prevailing.set(key, noteOffset);
          }
        }
      },

      insertionX(addToChord = false) {
        const ordered = this.ordered();
        const previous = ordered[AppState.cursorIndex - 1];
        const next = ordered[AppState.cursorIndex];

        if (
          addToChord &&
          previous &&
          previous.kind !== "barline" &&
          previous.letter
        ) {
          return previous.x;
        }

        if (!ordered.length) return AppState.camera.x + 220;
        if (AppState.cursorIndex <= 0) return ordered[0].x - 34;
        if (AppState.cursorIndex >= ordered.length) {
          const last = ordered[ordered.length - 1];
          return last.x + this.spacingAfter(last);
        }

        if (previous && next) {
          return previous.x === next.x
            ? previous.x
            : (previous.x + next.x) / 2;
        }

        return ordered[0].x - 34;
      },

      createFromDegree(degree, addToChord = false) {
        this.saveUndo();
        const x = this.insertionX(addToChord);

        const pitch = this.pitchFromDegree(degree);
        const selectedAccidental = AppState.noteInput.accidental;
        const staff = 0;
        const effectiveAccidental = this.effectiveAccidental(
          pitch.letter,
          pitch.octave,
          staff,
          x,
          selectedAccidental
        );

        const note = this.create({
          x,
          letter: pitch.letter,
          octave: pitch.octave,
          staff,
          accidental: effectiveAccidental.accidental,
          showAccidental: effectiveAccidental.showAccidental
        });

        if (
          Input.beamModifierHeld &&
          this.isBeamableValue(note.value)
        ) {
          if (!Input.beamGroupSeeded) {
            const previous = this.ordered()[AppState.cursorIndex - 1];
            if (
              previous &&
              previous.kind === "note" &&
              this.isBeamableValue(previous.value)
            ) {
              previous.beamGroupId = Input.activeBeamGroupId;
            }
            Input.beamGroupSeeded = true;
          }

          note.beamGroupId = Input.activeBeamGroupId;
        }

        AppState.notes.push(note);

        AppState.noteInput.selectedAccidental = "natural";

        if (Input.heldAccidentals.size === 0) {
          AppState.noteInput.accidental = "natural";
        }

        this.layout();
        this.refreshAccidentalDisplay();

        const newOrdered = this.ordered();
        if (addToChord) {
          let lastChordIndex = -1;

          newOrdered.forEach((item, index) => {
            if (item.kind === "note" && item.x === note.x) {
              lastChordIndex = index;
            }
          });

          AppState.cursorIndex = lastChordIndex + 1;
        } else {
          AppState.cursorIndex = newOrdered.findIndex(n => n.id === note.id) + 1;
        }

        this.syncCursorToActiveNote();
        this.resetCursorBlink();
        this.scrollToNote(note);
      },

      createBarline() {
        this.saveUndo();
        const barline = {
          id: AppState.nextId++,
          kind: "barline",
          x: this.insertionX(false),
          layoutX: 0,
          drawX: 0,
          y: 0
        };

        barline.layoutX = barline.x;
        barline.drawX = barline.x;
        AppState.notes.push(barline);
        this.layout();
        barline.drawX = barline.layoutX;
        this.refreshAccidentalDisplay();

        const ordered = this.ordered();
        AppState.cursorIndex = ordered.findIndex(item => item.id === barline.id) + 1;

        this.resetCursorBlink();
        this.scrollToNote(barline);
      },

      createRest() {
        this.saveUndo();

        const rest = {
          id: AppState.nextId++,
          kind: "rest",
          x: this.insertionX(false),
          layoutX: 0,
          drawX: 0,
          y: Layout.lineY(2),
          value: AppState.noteInput.value
        };

        rest.layoutX = rest.x;
        rest.drawX = rest.x;
        AppState.notes.push(rest);
        this.layout();
        this.refreshAccidentalDisplay();

        const ordered = this.ordered();
        AppState.cursorIndex = ordered.findIndex(item => item.id === rest.id) + 1;

        this.resetCursorBlink();
        this.scrollToNote(rest);
      },

      keySignatureX() {
        const active = this.activeItem();

        if (
          active &&
          active.kind === "note" &&
          this.chordOf(active).length > 1
        ) {
          return active.x - 34;
        }

        return this.insertionX(false);
      },

      createKeySignature(count, accidental) {
        const safeCount = Math.max(0, Math.min(7, count));
        const safeAccidental = accidental === "flat" ? "flat" : "sharp";

        this.saveUndo();

        const keySignature = {
          id: AppState.nextId++,
          kind: "keysig",
          x: this.keySignatureX(),
          layoutX: 0,
          drawX: 0,
          y: 0,
          count: safeCount,
          accidental: safeAccidental
        };

        keySignature.layoutX = keySignature.x;
        keySignature.drawX = keySignature.x;
        AppState.notes.push(keySignature);
        this.layout();
        this.refreshAccidentalDisplay();

        const ordered = this.ordered();
        AppState.cursorIndex =
          ordered.findIndex(item => item.id === keySignature.id) + 1;

        this.resetCursorBlink();
        this.scrollToNote(keySignature);
      },

      deleteBehindCursor() {
        const ordered = this.ordered();
        const index = AppState.cursorIndex - 1;
        if (index < 0) return;

        this.saveUndo();
        const activeItem = ordered[index];
        let target = activeItem;

        if (activeItem.kind === "note") {
          const chord = this.chordOf(activeItem);
          target = this.chordDeleteTarget(chord, activeItem);
        }

        const targetIndex = ordered.findIndex(item => item.id === target.id);

        AppState.notes = AppState.notes.filter(n => n.id !== target.id);

        if (targetIndex >= 0 && targetIndex < AppState.cursorIndex) {
          AppState.cursorIndex -= 1;
        }

        AppState.cursorIndex = Math.max(
          0,
          Math.min(AppState.cursorIndex, AppState.notes.length)
        );

        this.layout();
        this.refreshAccidentalDisplay();
        this.syncCursorToActiveNote();
        this.resetCursorBlink();
      },

      applyAccidentalToActiveNote(accidental = AppState.noteInput.accidental) {
        const active = this.activeItem();

        if (!active || active.kind !== "note") return false;
        if (!this.accidentalOffset.hasOwnProperty(accidental)) return false;

        this.saveUndo();
        active.accidental = accidental;
        active.showAccidental = true;
        this.refreshAccidentalDisplay();
        this.syncCursorToActiveNote();
        this.resetCursorBlink();
        return true;
      },

      clearSelection() {
        AppState.selection = null;
      },

      selectedRange() {
        const ordered = this.ordered();
        if (!ordered.length) return null;

        if (AppState.selection) {
          return {
            start: Math.max(
              0,
              Math.min(ordered.length - 1, AppState.selection.start)
            ),
            end: Math.max(
              0,
              Math.min(ordered.length - 1, AppState.selection.end)
            ),
            activeEdge: AppState.selection.activeEdge
          };
        }

        if (AppState.cursorIndex <= 0) return null;

        const index = Math.min(AppState.cursorIndex - 1, ordered.length - 1);
        return { start: index, end: index, activeEdge: "right" };
      },

      isIndexSelected(index) {
        const range = this.selectedRange();
        if (!range) return false;

        return index >= range.start && index <= range.end;
      },

      isItemSelected(item) {
        const ordered = this.ordered();
        const index = ordered.findIndex(candidate => candidate.id === item.id);

        return index >= 0 && this.isIndexSelected(index);
      },

      selectionEdgeForDelta(delta) {
        return delta < 0 ? "left" : "right";
      },

      extendSelection(delta, useOppositeEdge = false) {
        const ordered = this.ordered();
        if (!ordered.length || delta === 0) return;

        const activeIndex = Math.max(
          0,
          Math.min(ordered.length - 1, AppState.cursorIndex - 1)
        );

        if (!AppState.selection) {
          const nextIndex = Math.max(
            0,
            Math.min(ordered.length - 1, activeIndex + delta)
          );

          if (nextIndex === activeIndex) return;

          AppState.selection = {
            start: Math.min(activeIndex, nextIndex),
            end: Math.max(activeIndex, nextIndex),
            activeEdge: this.selectionEdgeForDelta(delta)
          };
        } else {
          let edge = AppState.selection.activeEdge;

          if (useOppositeEdge) {
            edge = edge === "left" ? "right" : "left";
          }

          if (edge === "left") {
            AppState.selection.start = Math.max(
              0,
              Math.min(AppState.selection.end, AppState.selection.start + delta)
            );
          } else {
            AppState.selection.end = Math.max(
              AppState.selection.start,
              Math.min(ordered.length - 1, AppState.selection.end + delta)
            );
          }
        }

        const activeEdge = useOppositeEdge
          ? AppState.selection.activeEdge === "left"
            ? "right"
            : "left"
          : AppState.selection.activeEdge;
        const cursorEdgeIndex = activeEdge === "left"
          ? AppState.selection.start
          : AppState.selection.end;

        AppState.cursorIndex = cursorEdgeIndex + 1;
        this.syncCursorToActiveNote();
        this.resetCursorBlink();
      },

      slideSelection(delta) {
        const ordered = this.ordered();
        if (!ordered.length || delta === 0) return;

        if (!AppState.selection) {
          const activeIndex = Math.max(
            0,
            Math.min(ordered.length - 1, AppState.cursorIndex - 1)
          );
          AppState.selection = {
            start: activeIndex,
            end: activeIndex,
            activeEdge: "right"
          };
        }

        const nextStart = AppState.selection.start + delta;
        const nextEnd = AppState.selection.end + delta;

        if (nextStart < 0 || nextEnd >= ordered.length) return;

        AppState.selection.start = nextStart;
        AppState.selection.end = nextEnd;

        const cursorEdgeIndex = AppState.selection.activeEdge === "left"
          ? AppState.selection.start
          : AppState.selection.end;

        AppState.cursorIndex = cursorEdgeIndex + 1;
        this.syncCursorToActiveNote();
        this.resetCursorBlink();
      },

      moveCursor(delta) {
        this.clearSelection();
        AppState.cursorIndex = Math.max(
          0,
          Math.min(this.ordered().length, AppState.cursorIndex + delta)
        );

        this.syncCursorToActiveNote();
        const active = this.activeItem();
        if (active) this.scrollToNote(active);
        this.resetCursorBlink();
      },

      selectItem(item) {
        const ordered = this.ordered();
        const index = ordered.findIndex(candidate => candidate.id === item?.id);
        if (index < 0) return false;

        this.clearSelection();
        AppState.cursorIndex = index + 1;
        this.syncCursorToActiveNote();
        this.resetCursorBlink();
        this.scrollToNote(item);
        return true;
      },

      moveCursorVertical(delta) {
        AppState.cursorStaffOffset += delta;
        this.resetCursorBlink();
      },

      updateTableScroll(dt = 16) {
        const ordered = this.ordered();
        const a = Layout.table;
        const rowH = 24;
        const headerH = 46;
        const contentH = headerH + ordered.length * rowH;
        const maxScroll = Math.max(0, contentH - a.h);

        if (!ordered.length || AppState.cursorIndex <= 0) {
          AppState.tableScroll.y += (0 - AppState.tableScroll.y) * 0.08;
          AppState.tableScroll.velocity *= 0.82;
          Layout.table.scrollY = AppState.tableScroll.y;
          return;
        }

        const selectedRowCenter =
          headerH +
          (Math.min(AppState.cursorIndex - 1, ordered.length - 1) + 0.5) * rowH;
        const viewTop = AppState.tableScroll.y;
        const viewBottom = viewTop + a.h;
        const middleTop = viewTop + a.h / 3;
        const middleBottom = viewTop + a.h * 2 / 3;
        let target = AppState.tableScroll.y;

        if (selectedRowCenter < middleTop) {
          target = selectedRowCenter - a.h / 3;
        } else if (selectedRowCenter > middleBottom) {
          target = selectedRowCenter - a.h * 2 / 3;
        }

        target = Math.max(0, Math.min(maxScroll, target));

        const seconds = Math.min(0.05, Math.max(0.001, dt / 1000));
        const distance = target - AppState.tableScroll.y;
        const acceleration = distance * 72;

        AppState.tableScroll.velocity += acceleration * seconds;
        AppState.tableScroll.velocity *= Math.pow(0.0009, seconds);

        const maxVelocity = Math.max(700, Math.abs(distance) * 14 + 260);
        AppState.tableScroll.velocity = Math.max(
          -maxVelocity,
          Math.min(maxVelocity, AppState.tableScroll.velocity)
        );

        AppState.tableScroll.y += AppState.tableScroll.velocity * seconds;

        if (Math.abs(distance) < 0.35 && Math.abs(AppState.tableScroll.velocity) < 8) {
          AppState.tableScroll.y = target;
          AppState.tableScroll.velocity = 0;
        }

        if (AppState.tableScroll.y < 0) {
          AppState.tableScroll.y = 0;
          AppState.tableScroll.velocity = 0;
        } else if (AppState.tableScroll.y > maxScroll) {
          AppState.tableScroll.y = maxScroll;
          AppState.tableScroll.velocity = 0;
        }

        Layout.table.scrollY = AppState.tableScroll.y;
      },

      spacingAfter(item) {
        if (item.kind === "keysig") {
          return Math.max(34, item.count * 12 + 18);
        }

        return 34;
      },

      isBeamableValue(value) {
        return value === "1/8" ||
          value === "1/16" ||
          value === "1/32" ||
          value === "1/64";
      },

      layout() {
        const ordered = this.ordered();
        if (!ordered.length) return;

        ordered[0].layoutX = ordered[0].x;

        for (let i = 1; i < ordered.length; i++) {
          const prev = ordered[i - 1];
          const cur = ordered[i];

          if (cur.x === prev.x) {
            cur.layoutX = prev.layoutX;
          } else {
            cur.layoutX = Math.max(cur.x, prev.layoutX + this.spacingAfter(prev));
          }
        }
      },

      updateAnimation() {
        const now = performance.now();
        for (const n of AppState.notes) {
          n.drawX += (n.layoutX - n.drawX) * 0.22;

        if (n.kind === "note") {
          n.y = this.yFromPitch(n.letter, n.octave);
        }

        const selectionTarget = this.isItemSelected(n) ? 1 : 0;
        const currentSelection = n.selectionAmount ?? 0;

        if (n.selectionTarget !== selectionTarget) {
          n.selectionFrom = currentSelection;
          n.selectionTarget = selectionTarget;
          n.selectionStartedAt = now;
        }

        const selectionT = Math.min(
          1,
          (now - (n.selectionStartedAt ?? now)) / 200
        );
        const easedSelection = selectionT < 0.5
          ? 2 * selectionT * selectionT
          : 1 - Math.pow(-2 * selectionT + 2, 2) / 2;

        n.selectionAmount =
          (n.selectionFrom ?? currentSelection) +
          (selectionTarget - (n.selectionFrom ?? currentSelection)) *
          easedSelection;
      }
      },

      chordOf(note) {
        return AppState.notes.filter(n => n.kind === "note" && n.x === note.x);
      },

      activeItem() {
        const ordered = this.ordered();
        if (!ordered.length || AppState.cursorIndex <= 0) return null;

        return ordered[
          Math.min(AppState.cursorIndex - 1, ordered.length - 1)
        ];
      },

      staffOffsetFromY(y) {
        return Math.round(
          (y - Layout.lineY(2)) / (Layout.S / 2)
        );
      },

      syncCursorToActiveNote() {
        const active = this.activeItem();
        if (!active || active.kind !== "note") return;

        AppState.cursorStaffOffset = this.staffOffsetFromY(active.y);
      },

      cursorY() {
        return (
          Layout.lineY(2) +
          AppState.cursorStaffOffset * (Layout.S / 2)
        );
      },

      chordDeleteTarget(chord, activeNote) {
        const cursorY = this.cursorY();
        const epsilon = 0.001;

        return [...chord].sort((a, b) => {
          const cursorDistanceA = Math.abs(a.y - cursorY);
          const cursorDistanceB = Math.abs(b.y - cursorY);

          if (Math.abs(cursorDistanceA - cursorDistanceB) > epsilon) {
            return cursorDistanceA - cursorDistanceB;
          }

          const activeDistanceA = activeNote
            ? Math.abs(a.y - activeNote.y)
            : Number.POSITIVE_INFINITY;
          const activeDistanceB = activeNote
            ? Math.abs(b.y - activeNote.y)
            : Number.POSITIVE_INFINITY;

          if (Math.abs(activeDistanceA - activeDistanceB) > epsilon) {
            return activeDistanceA - activeDistanceB;
          }

          if (Math.abs(a.y - b.y) > epsilon) {
            return a.y - b.y;
          }

          return a.id - b.id;
        })[0];
      },

      stemOwner(note) {
        return this.chordOf(note).reduce(
          (highest, n) => n.y < highest.y ? n : highest,
          note
        );
      },

      chordStemDown(note) {
        const chord = this.chordOf(note);
        return this.stemPlanForChord(chord).direction < 0;
      },

      chordStaffCenterOffset(chord) {
        if (!chord.length) return 0;

        const offsets = chord.map(note =>
          (Layout.lineY(2) - note.y) / (Layout.S / 2)
        );

        return offsets.reduce((sum, offset) => sum + offset, 0) / offsets.length;
      },

      standardStemDirectionForOffset(offset) {
        return offset > 0 ? -1 : 1;
      },

      flagCountForValue(value) {
        return {
          "1/8": 1,
          "1/16": 2,
          "1/32": 3,
          "1/64": 4
        }[value] || 0;
      },

      nearbyStemContext(chord) {
        const orderedChords = [];

        for (const item of this.ordered()) {
          if (item.kind !== "note") continue;

          let group = orderedChords.find(entry => entry.x === item.x);
          if (!group) {
            group = { x: item.x, notes: [] };
            orderedChords.push(group);
          }
          group.notes.push(item);
        }

        const chordX = chord[0]?.x;
        const index = orderedChords.findIndex(group => group.x === chordX);
        if (index < 0) return null;

        const neighbors = orderedChords
          .slice(Math.max(0, index - 2), index)
          .concat(orderedChords.slice(index + 1, index + 3));

        if (!neighbors.length) return null;

        const offsets = neighbors.map(group =>
          this.chordStaffCenterOffset(group.notes)
        );
        const mean =
          offsets.reduce((sum, offset) => sum + offset, 0) / offsets.length;
        const upVotes = offsets.filter(offset =>
          this.standardStemDirectionForOffset(offset) > 0
        ).length;
        const downVotes = offsets.length - upVotes;

        return {
          mean,
          majorityDirection: upVotes >= downVotes ? 1 : -1,
          majorityRatio: Math.max(upVotes, downVotes) / offsets.length
        };
      },

      stemDirectionForChord(chord) {
        if (!chord.length) return 1;

        const beamGroupId = chord.find(note => note.beamGroupId)?.beamGroupId;
        const contextNotes = beamGroupId
          ? AppState.notes.filter(note =>
            note.kind === "note" &&
            note.beamGroupId === beamGroupId
          )
          : chord;
        const offset = this.chordStaffCenterOffset(contextNotes);
        const standardDirection = this.standardStemDirectionForOffset(offset);
        const localContext = this.nearbyStemContext(chord);

        if (
          !beamGroupId &&
          Math.abs(offset) <= 1.25 &&
          localContext &&
          localContext.majorityDirection !== standardDirection &&
          localContext.majorityRatio >= 0.67 &&
          Math.abs(localContext.mean) >= 0.65
        ) {
          return localContext.majorityDirection;
        }

        return standardDirection;
      },

      stemLengthForChord(chord, direction = this.stemDirectionForChord(chord)) {
        if (!chord.length) return Layout.S * 3.5;

        const ys = chord.map(note => note.y);
        const highest = Math.min(...ys);
        const lowest = Math.max(...ys);
        const span = lowest - highest;
        const values = chord.map(note => note.value);
        const maxFlags = Math.max(...values.map(value => this.flagCountForValue(value)));
        const goldenRatio = (1 + Math.sqrt(5)) / 2;
        const flagHeight = maxFlags
          ? Layout.S * (0.72 + (maxFlags - 1) * 0.42)
          : 0;
        const flagMinimum = flagHeight * goldenRatio;
        const outerY = direction > 0 ? highest : lowest;
        const outsideStaff = direction > 0
          ? Math.max(0, Layout.lineY(0) - outerY)
          : Math.max(0, outerY - Layout.lineY(4));
        const contourExtension = Math.min(Layout.S * 1.2, outsideStaff * 0.32);
        const base = Layout.S * 3.35 + span * 0.42 + contourExtension;

        return Math.max(
          Layout.S * 2.9,
          Math.min(Layout.S * 5.6, Math.max(base, flagMinimum))
        );
      },

      stemPlanForChord(chord) {
        const direction = this.stemDirectionForChord(chord);

        return {
          direction,
          stemDown: direction < 0,
          length: this.stemLengthForChord(chord, direction)
        };
      },

      noteheadScreenX(note) {
        const baseX = note.drawX !== undefined
          ? note.drawX
          : note.layoutX;

        return (
          Input.worldToScreenX(baseX) +
          this.visualScreenOffsetX(note)
        );
      },

      baseX(item) {
        return item.drawX !== undefined
          ? item.drawX
          : item.layoutX !== undefined
            ? item.layoutX
            : item.x;
      },

      visualScreenOffsetX(item) {
        if (item.kind === "note") {
          return item.vexNoteheadOffsetX ??
            this.noteheadOffset(item, this.chordStemDown(item));
        }

        if (item.kind === "rest") {
          return item.vexRestOffsetX ?? 0;
        }

        return 0;
      },

      displayScreenCenterX(item) {
        return (
          Input.worldToScreenX(this.baseX(item)) +
          this.visualScreenOffsetX(item)
        );
      },

      displayCenterX(item) {
        return (
          this.baseX(item) +
          this.visualScreenOffsetX(item) / AppState.camera.zoom
        );
      },

      noteheadScreenY(note) {
        return note.vexNoteheadY ?? note.y;
      },

      noteheadOffset(note, stemDown) {
        const chord = this.chordOf(note);
        if (chord.length < 2) return 0;

        const ordered = [...chord].sort((a, b) => {
          const aStep = this.diatonicStep(a.letter, a.octave);
          const bStep = this.diatonicStep(b.letter, b.octave);
          return stemDown ? bStep - aStep : aStep - bStep;
        });

        let oppositeSide = false;

        for (let i = 0; i < ordered.length; i++) {
          if (i > 0) {
            const previousStep = this.diatonicStep(
              ordered[i - 1].letter,
              ordered[i - 1].octave
            );
            const currentStep = this.diatonicStep(
              ordered[i].letter,
              ordered[i].octave
            );

            oppositeSide = Math.abs(currentStep - previousStep) === 1
              ? !oppositeSide
              : false;
          }

          if (ordered[i].id === note.id) {
            if (!oppositeSide) return 0;
            return stemDown ? -18 : 18;
          }
        }

        return 0;
      },

      midi(note) {
        return (
          (note.octave + 1) * 12 +
          this.midiBase[note.letter] +
          this.accidentalOffset[note.accidental]
        );
      },

      frequency(note) {
        return 440 * Math.pow(2, (this.midi(note) - 69) / 12);
      },

      resetCursorBlink() {
        AppState.cursorBlinkStart = performance.now();
      },

      scrollToNote(note) {
        const sx = this.displayScreenCenterX(note);
        const rightLimit = canvas.width * 0.72;
        const leftLimit = canvas.width * 0.18;

        let target = AppState.camera.x;

        if (sx > rightLimit) {
          target += (sx - rightLimit) / AppState.camera.zoom;
        }

        if (sx < leftLimit) {
          target -= (leftLimit - sx) / AppState.camera.zoom;
        }

        AppState.camera.followX = Math.max(0, target);
      }
    };

          h: arrowSize,
          action: () => {
            if (Input.tonicModifierHeld) {
              Notes.stepTonic(-1);
            } else {
              Notes.moveCursor(-1);
            }
          }
        });

        buttons.push({
          type: "button",
          id: "down",
          label: "↓",
          x: centerX - arrowSize / 2,
          y: rowY,
          w: arrowSize,
          h: arrowSize,
          action: () => {
            if (Input.tonicModifierHeld) {
              Notes.stepTonicOctave(-1);
            } else {
              Notes.moveCursorVertical(1);
            }
          }
        });

        buttons.push({
          type: "button",
          id: "right",
          label: "→",
          x: centerX + arrowSize / 2 + gap2,
          y: rowY,
          w: arrowSize,
          h: arrowSize,
          action: () => {
            if (Input.tonicModifierHeld) {
              Notes.stepTonic(1);
            } else {
              Notes.moveCursor(1);
            }
          }
        });

        const tonicButtons = this.tonicControlButtons();
        const utilityButtons = this.utilityButtons(tonicButtons);

        this.visibleButtons = [
          ...this.menuBarButtons(),
          ...buttons,
          ...utilityButtons,
          ...this.controlSliders(utilityButtons),
          ...tonicButtons,
          ...this.keypadButtons()
        ];

        if (AppState.noteInput.tonicMenuOpen) {
          this.visibleButtons.push(...this.tonicMenuButtons(tonicButtons));
        }

        if (Input.keySignatureModifierHeld) {
          this.visibleButtons.push(...this.keySignatureMenuButtons(utilityButtons));
        }
      },

      utilityButtons(tonicButtons) {
        const tonic = tonicButtons.find(b => b.id === "tonic-letter");
        const p = Layout.sidePanel;
        const gap = 8;
        const w = 84;
        const h = 34;
        const x = Math.max(p.x, tonic.x - w - 12);
        const y = tonic.y;
        const make = (id, label, index, action) => ({
          type: "button",
          id,
          label,
          x,
          y: y + index * (h + gap),
          w,
          h,
          action
        });

        return [
          make("virtual-k", "Key", 0, () => {
            Input.keySignatureModifierHeld = !Input.keySignatureModifierHeld;

            if (Input.keySignatureModifierHeld) {
              Input.tonicModifierHeld = false;
            }
          })
        ];
      },

      controlSliders(utilityButtons) {
        const keyButton = utilityButtons.find(b => b.id === "virtual-k");
        if (!keyButton) return [];

        return [
          {
            type: "controlSlider",
            id: "noteheadDiameterScale",
            label: "Notehead",
            min: 0.65,
            max: 1.55,
            valuePath: ["controls", "noteheadDiameterScale"],
            x: keyButton.x,
            y: keyButton.y + keyButton.h + 12,
            w: keyButton.w,
            h: 46
          }
        ];
      },

      cursorBezierSliders() {
        const p = Layout.sidePanel;
        const panelSize = Math.max(
          150,
          Math.min(230, p.w, p.h - 105)
        );
        const x = p.x;
        const y = p.y + 92;
        const pad = 14;
        const titleH = 24;
        const sliderH = Math.max(24, (panelSize - titleH - pad * 2) / 4);
        const sliderX = x + pad;
        const sliderW = panelSize - pad * 2;
        const sliders = [
          {
            id: "wideCenterRatio",
            label: "Wide",
            min: 1 / 40,
            max: 1 / 6
          },
          {
            id: "bustSizeRatio",
            label: "Bust",
            min: 1 / 80,
            max: 1 / 8
          },
          {
            id: "midriffRatio",
            label: "Midriff",
            min: 1 / 100,
            max: 1 / 10
          },
          {
            id: "neckCircumferenceRatio",
            label: "Neck",
            min: 1 / 120,
            max: 1 / 12
          }
        ];

        return sliders.map((slider, index) => ({
          type: "cursorSlider",
          ...slider,
          x: sliderX,
          y: y + titleH + pad + index * sliderH,
          w: sliderW,
          h: sliderH,
          panel: { x, y, size: panelSize }
        }));
      },

      setCursorSliderValue(slider, sx) {
        if (!slider || (slider.type !== "cursorSlider" && slider.type !== "controlSlider")) return;

        const trackPad = 11;
        const left = slider.x + trackPad;
        const right = slider.x + slider.w - trackPad;
        const t = Math.max(0, Math.min(1, (sx - left) / (right - left)));
        const value = slider.min + (slider.max - slider.min) * t;

        if (slider.type === "controlSlider" && slider.valuePath) {
          const [group, key] = slider.valuePath;
          AppState[group][key] = value;
          return;
        }

        AppState.cursorBezier[slider.id] = value;
      },

      tonicControlButtons() {
        const k = Layout.keypad;
        const valueH = 38;
        const accidentalH = 38;
        const gap = 10;
        const gridY = k.y + valueH + gap + accidentalH + 12;
        const cellH = (k.h - valueH - gap - accidentalH - 12) / 3;
        const controlGap = 10;
        const totalW = Math.min(124, Math.max(86, k.x - Layout.sidePanel.x - 100));
        const halfW = totalW / 2;
        const x = k.x - controlGap - totalW;
        const y = gridY + cellH;
        const toggleMenu = () => {
          AppState.noteInput.tonicMenuOpen = !AppState.noteInput.tonicMenuOpen;
        };

        return [
          {
            type: "tonicDisplay",
            id: "tonic-letter",
            label: AppState.noteInput.tonicLetter,
            x,
            y,
            w: halfW,
            h: cellH,
            action: toggleMenu
          },
          {
            type: "tonicDisplay",
            id: "tonic-octave",
            label: String(AppState.noteInput.tonicOctave),
            x: x + halfW,
            y,
            w: halfW,
            h: cellH,
            action: toggleMenu
          }
        ];
      },





      keypadButtons() {
        const k = Layout.keypad;
        const buttons = [];

        const noteValues = [
          ["1/64", "64"],
          ["1/32", "32"],
          ["1/16", "𝅘𝅥𝅯"],
          ["1/8", "♪"],
          ["1/4", "♩"],
          ["1/2", "𝅗𝅥"],
          ["1", "𝅝"]
        ];

        const valueH = 38;
        const accidentalH = 38;
        const gap = 10;

        noteValues.forEach((v, i) => {
          buttons.push({
            type: "noteValue",
            value: v[0],
            label: v[1],
            x: k.x + i * (k.w / noteValues.length),
            y: k.y,
            w: k.w / noteValues.length,
            h: valueH,
            action: () => { AppState.noteInput.value = v[0]; }
          });
        });

        const acc = [
          ["double-flat", "𝄫"],
          ["flat", "♭"],
          ["natural", "♮"],
          ["sharp", "♯"],
          ["double-sharp", "𝄪"]
        ];

        acc.forEach((a, i) => {
          buttons.push({
            type: "accidental",
            value: a[0],
            label: a[1],
            x: k.x + i * (k.w / 5),
            y: k.y + valueH + gap,
            w: k.w / 5,
            h: accidentalH,
            action: () => {
              AppState.noteInput.selectedAccidental = a[0];
              if (Input.heldAccidentals.size === 0) {
                AppState.noteInput.accidental = a[0];
              }
            }
          });
        });

        const gridY = k.y + valueH + gap + accidentalH + 12;
        const cellW = k.w / 3;
        const cellH = (k.h - valueH - gap - accidentalH - 12) / 3;

        for (let degree = 1; degree <= 9; degree++) {
          const i = degree - 1;
          const degreeValue = degree;

          buttons.push({
            type: "degree",
            value: degree,
            label: Input.tonicModifierHeld && AppState.minusActive
              ? `-${degree}`
              : String(degree),
            x: k.x + (i % 3) * cellW,
            y: gridY + Math.floor(i / 3) * cellH,
            w: cellW,
            h: cellH,
            action: () => {
              if (Input.keySignatureModifierHeld) {
                if (degreeValue <= 7) {
                  Notes.createKeySignature(
                    degreeValue,
                    AppState.minusActive ? "flat" : "sharp"
                  );
                }

                return;
              }

              if (Input.tonicModifierHeld) {
                Notes.transposeTonicByInterval(
                  degreeValue,
                  AppState.minusActive
                );
                return;
              }

              Notes.createFromDegree(degreeValue, AppState.noteInput.shift);
            }
          });
        }

        return buttons;
      },

      tonicMenuButtons(buttons) {
        const tonic = buttons.find(b => b.id === "tonic-letter");
        const octaveButton = buttons.find(b => b.id === "tonic-octave");
        if (!tonic || !octaveButton) return [];

        const out = [];
        const letters = ["C", "D", "E", "F", "G", "A", "B"];
        const currentLetterIndex = Notes.letterIndex(AppState.noteInput.tonicLetter);
        const rowGap = 4;
        const rowH = Math.min(34, tonic.h);
        const wrapLetter = index =>
          letters[(index + letters.length) % letters.length];

        for (let offset = -4; offset <= 4; offset++) {
          if (offset === 0) continue;

          const y = tonic.y - offset * (rowH + rowGap);
          if (y < 8 || y + rowH > canvas.height - 8) continue;

          const letter = wrapLetter(currentLetterIndex + offset);
          out.push({
            type: "tonicLetter",
            value: letter,
            label: letter,
            x: tonic.x,
            y,
            w: tonic.w,
            h: rowH,
            pickerOffset: offset,
            action: () => { Notes.changeTonicLetter(letter); }
          });
        }

        for (let offset = -4; offset <= 4; offset++) {
          if (offset === 0) continue;

          const octave = AppState.noteInput.tonicOctave + offset;
          if (octave < Notes.minTonicOctave || octave > Notes.maxTonicOctave) continue;

          const y = octaveButton.y - offset * (rowH + rowGap);
          if (y < 8 || y + rowH > canvas.height - 8) continue;

          out.push({
            type: "tonicOctave",
            value: octave,
            label: String(octave),
            x: octaveButton.x,
            y,
            w: octaveButton.w,
            h: rowH,
            pickerOffset: offset,
            action: () => { Notes.changeTonicOctave(octave); }
          });
        }

        return out;
      },

      keySignatureMenuButtons(buttons) {
        const keyButton = buttons.find(b => b.id === "virtual-k");
        if (!keyButton) return [];

        const out = [];
        const gap = 2;
        const rowH = Math.min(18, keyButton.h);
        const make = (count, accidental, offset) => {
          const y = keyButton.y - offset * (rowH + gap);
          if (y < 8 || y + rowH > canvas.height - 8) return;

          const symbol = accidental === "flat" ? "♭" : "♯";
          out.push({
            type: "keySignatureChoice",
            id: `key-${count}-${accidental}`,
            count,
            accidental,
            label: `${count}${symbol}`,
            x: keyButton.x,
            y,
            w: keyButton.w,
            h: rowH,
            action: () => {
              Notes.createKeySignature(count, accidental);
              Input.keySignatureModifierHeld = false;
            }
          });
        };

        for (let count = 1; count <= 7; count++) {
          make(count, "sharp", count);
          make(count, "flat", -count);
        }

        return out;
      },

      hit(x, y) {
        const menuHit = this.menuHit(x, y);
        if (menuHit) return menuHit;

        for (let i = this.visibleButtons.length - 1; i >= 0; i--) {
          const b = this.visibleButtons[i];

          if (
            x >= b.x &&
            x <= b.x + b.w &&
            y >= b.y &&
            y <= b.y + b.h
          ) {
            return b;
          }
        }

        return null;
      },

      menuHit(x, y) {
        if (AppState.menu.open) {
          for (let i = AppState.menu.itemRects.length - 1; i >= 0; i--) {
            const item = AppState.menu.itemRects[i];
            if (
              x >= item.x &&
              x <= item.x + item.w &&
              y >= item.y &&
              y <= item.y + item.h
            ) {
              return item;
            }
          }
        }

        return null;
      },

      activate(b) {
        if (!b) return;
        if (b.type === "menuTitle") {
          AppState.menu.open = AppState.menu.open === b.id ? null : b.id;
          AppState.menu.submenu = null;
          return;
        }

        if (b.type === "menuItem") {
          if (b.disabled) return;

          if (b.submenu) {
            AppState.menu.submenu = b.id;
            return;
          }

          AppState.menu.open = null;
          AppState.menu.submenu = null;
          if (b.action) b.action();
          return;
        }

        if (b.action) b.action();
      }
    };

    const Input = {
      accidentalKeyMap: {
        KeyA: "double-flat",
        KeyS: "flat",
        KeyD: "natural",
        KeyF: "sharp",
        KeyG: "double-sharp"
      },

      noteValueKeyMap: {
        Digit1: "1/64",
        Digit2: "1/32",
        Digit3: "1/16",
        Digit4: "1/8",
        Digit5: "1/4",
        Digit6: "1/2",
        Digit7: "1"
      },

      degreeKeyMap: {
        Numpad1: 1,
        Numpad2: 2,
        Numpad3: 3,
        Numpad4: 4,
        Numpad5: 5,
        Numpad6: 6,
        Numpad7: 7,
        Numpad8: 8,
        Numpad9: 9,
        Comma: 1,
        Period: 2,
        Slash: 3,
        KeyL: 4,
        Semicolon: 5,
        Quote: 6,
        KeyO: 7,
        BracketLeft: 9,
        BracketRight: 9
      },

      heldAccidentals: new Map(),
      heldDegreeKeys: new Set(),
      degreeChordLeader: null,
      heldShiftKeys: new Set(),
      shiftReleaseTimers: new Map(),
      selectionSlideHeld: false,
      tonicModifierHeld: false,
      tonicIntervalNegative: false,
      keySignatureModifierHeld: false,
      keySignatureAccidental: "sharp",
      beamModifierHeld: false,
      activeBeamGroupId: null,
      beamGroupSeeded: false,

      screenToWorldX(sx) {
        return sx / AppState.camera.zoom + AppState.camera.x;
      },

      worldToScreenX(wx) {
        return (wx - AppState.camera.x) * AppState.camera.zoom;
      },

      pointer(e) {
        const r = canvas.getBoundingClientRect();

        const sx =
          (e.clientX - r.left) * (canvas.width / r.width);

        const sy =
          (e.clientY - r.top) * (canvas.height / r.height);

        return {
          sx,
          sy,
          wx: this.screenToWorldX(sx)
        };
      },

      hoverNotes() {
        if (AppState.hover.noteId === null) return [];

        const note = AppState.notes.find(n =>
          n.kind === "note" &&
          n.id === AppState.hover.noteId
        );

        if (!note) return [];

        return AppState.hover.shiftChord
          ? Notes.chordOf(note)
          : [note];
      },

      noteheadAtPoint(p) {
        let best = null;
        let bestScore = Number.POSITIVE_INFINITY;

        for (const note of AppState.notes) {
          if (note.kind !== "note") continue;

          const sx = Notes.noteheadScreenX(note);
          const sy = Notes.noteheadScreenY(note);
          const diameterScale = AppState.controls.noteheadDiameterScale;
          const dx = (p.sx - sx) / (18 * diameterScale);
          const dy = (p.sy - sy) / (14 * diameterScale);
          const score = dx * dx + dy * dy;

          if (score <= 1 && score < bestScore) {
            best = note;
            bestScore = score;
          }
        }

        return best;
      },

      beamHandleAtPoint(p) {
        let best = null;
        let bestDistance = Number.POSITIVE_INFINITY;

        for (const [groupId, geometry] of AppState.beamRender.entries()) {
          const handles = [
            { handle: "left", x: geometry.leftX, y: geometry.leftY },
            { handle: "middle", x: geometry.midX, y: geometry.midY },
            { handle: "right", x: geometry.rightX, y: geometry.rightY }
          ];

          for (const handle of handles) {
            const distance = Math.hypot(p.sx - handle.x, p.sy - handle.y);
            if (distance <= 11 && distance < bestDistance) {
              best = { groupId, ...handle };
              bestDistance = distance;
            }
          }
        }

        return best;
      },

      beamAtPoint(p) {
        let best = null;
        let bestDistance = Number.POSITIVE_INFINITY;

        for (const [groupId, geometry] of AppState.beamRender.entries()) {
          const y = Renderer.beamLineY(geometry, p.sx);
          const withinX =
            p.sx >= Math.min(geometry.leftX, geometry.rightX) - 10 &&
            p.sx <= Math.max(geometry.leftX, geometry.rightX) + 10;
          const distance = Math.abs(p.sy - y);

          if (withinX && distance <= 12 && distance < bestDistance) {
            best = { groupId };
            bestDistance = distance;
          }
        }

        return best;
      },

      updateHover(p, shiftKey = false) {
        AppState.hover.sx = p.sx;
        AppState.hover.sy = p.sy;

        this.updateTutorialHover(p);

        if (AppState.menu.open) {
          const menuHit = CanvasUI.menuHit(p.sx, p.sy);
          AppState.menu.hoverId = menuHit?.id ?? null;
          if (menuHit?.submenu) {
            AppState.menu.submenu = menuHit.id;
          }

          const titleHit = CanvasUI.visibleButtons.find(b =>
            b.type === "menuTitle" &&
            p.sx >= b.x &&
            p.sx <= b.x + b.w &&
            p.sy >= b.y &&
            p.sy <= b.y + b.h
          );

          if (titleHit && titleHit.id !== AppState.menu.open) {
            AppState.menu.open = titleHit.id;
            AppState.menu.submenu = null;
          }
        }

        const shifted = shiftKey || this.heldShiftKeys.size > 0;
        const best = this.noteheadAtPoint(p);

        const nextNoteId = best ? best.id : null;
        const nextChordX = best && shifted ? best.x : null;
        const changed =
          AppState.hover.noteId !== nextNoteId ||
          AppState.hover.chordX !== nextChordX ||
          AppState.hover.shiftChord !== (best ? shifted : false);

        if (changed) {
          AppState.hover.startedAt = performance.now();
        }

        AppState.hover.noteId = nextNoteId;
        AppState.hover.chordX = nextChordX;
        AppState.hover.shiftChord = best ? shifted : false;
      },

      tutorialTextForHit(hit) {
        if (!hit) return "This is the notation workspace. Hover controls for explanations.";

        if (hit.tutorial) return hit.tutorial;
        if (hit.type === "menuTitle") return `Open the ${hit.label} menu.`;
        if (hit.type === "menuItem") return hit.submenu
          ? `${hit.label} opens a submenu.`
          : `Choose ${hit.label}.`;
        if (hit.type === "degree") return `Create scale degree ${hit.value}.`;
        if (hit.type === "noteValue") return `Set duration to ${hit.label}.`;
        if (hit.type === "accidental") return `Select accidental ${hit.label}.`;
        if (hit.type === "tonicDisplay") return "Open the tonic date-picker.";
        if (hit.type === "keySignatureChoice") return `Insert key signature ${hit.label}.`;
        if (hit.type === "controlSlider") return "Drag to adjust notehead diameter.";
        if (hit.id === "virtual-k") return "Open the key signature picker.";
        if (hit.id === "delete") return "Delete the active note, rest, or barline.";
        if (hit.id === "shift") return "Toggle chord/selection shift behavior.";
        if (hit.id === "left" || hit.id === "right") return "Move the cursor left or right.";
        if (hit.id === "up" || hit.id === "down") return "Move the horizontal cursor vertically.";

        return hit.label ? `${hit.label} control.` : "";
      },

      updateTutorialHover(p) {
        if (!AppState.tutorial.enabled) return;

        const hit = CanvasUI.hit(p.sx, p.sy);
        const id = hit
          ? `${hit.type}:${hit.id ?? hit.value ?? hit.label}`
          : "workspace";
        const text = this.tutorialTextForHit(hit);

        if (AppState.tutorial.hoverId !== id) {
          AppState.tutorial.hoverId = id;
          AppState.tutorial.hoverText = text;
          AppState.tutorial.hoverStartedAt = performance.now();
        }
      },

      refreshHover(shiftKey = false) {
        if (AppState.hover.sx === null || AppState.hover.sy === null) return;

        this.updateHover(
          {
            sx: AppState.hover.sx,
            sy: AppState.hover.sy,
            wx: this.screenToWorldX(AppState.hover.sx)
          },
          shiftKey
        );
      },

      clearHover() {
        AppState.hover.noteId = null;
        AppState.hover.chordX = null;
        AppState.hover.shiftChord = false;
        AppState.hover.startedAt = 0;
        AppState.hover.sx = null;
        AppState.hover.sy = null;
        AppState.tutorial.hoverId = null;
        AppState.tutorial.hoverText = "";
      },

      bind() {
        canvas.addEventListener("pointerdown", e => this.down(e));
        canvas.addEventListener("pointermove", e => this.move(e));
        canvas.addEventListener("pointerup", e => this.up(e));
        canvas.addEventListener("pointercancel", e => this.cancel(e));
        canvas.addEventListener("pointerleave", () => this.clearHover());
        canvas.addEventListener("wheel", e => this.wheel(e), { passive: false });
        importFileInput?.addEventListener("change", e => this.importFile(e));
        renameOkButton?.addEventListener("click", () => CanvasUI.commitRenameModal());
        renameCancelButton?.addEventListener("click", () => CanvasUI.closeRenameModal());
        renameModal?.addEventListener("pointerdown", e => {
          if (e.target === renameModal) CanvasUI.closeRenameModal();
        });
        renameInput?.addEventListener("keydown", e => {
          if (e.code === "Enter") {
            e.preventDefault();
            CanvasUI.commitRenameModal();
          } else if (e.code === "Escape") {
            e.preventDefault();
            CanvasUI.closeRenameModal();
          }
        });
        window.addEventListener("keydown", e => this.keydown(e));
        window.addEventListener("keyup", e => this.keyup(e));
        window.addEventListener("blur", () => this.releaseAccidentals());
      },

      importFile(e) {
        const file = e.target.files?.[0];
        if (!file) return;

        const name = file.name || "selected file";
        const isMidi = /\.(mid|midi)$/i.test(name);
        const isMusicXML = /\.(musicxml|xml)$/i.test(name);
        const kind = isMidi
          ? "MIDI"
          : isMusicXML
            ? "MusicXML"
            : "file";

        CanvasUI.notify(`Import ${kind}: ${name}`);
      },

      keydown(e) {
        if (e.target === renameInput) return;

        if (e.code === "KeyP") {
          e.preventDefault();

          if (!e.repeat) {
            AppState.playback.enabled = !AppState.playback.enabled;
            AppState.playback.playing = false;
            CanvasUI.notify(
              AppState.playback.enabled
                ? "Playback mode on"
                : "Playback mode off"
            );
          }

          return;
        }

        if (AppState.playback.enabled) {
          e.preventDefault();

          if (e.code === "Space" && !e.repeat) {
            AppState.playback.playing = !AppState.playback.playing;
            CanvasUI.notify(AppState.playback.playing ? "Play" : "Pause");
          }

          return;
        }

        if (e.ctrlKey || e.metaKey) {
          if (e.code === "KeyR") {
            return;
          }

          e.preventDefault();

          if (e.code === "KeyZ" && !e.shiftKey) {
            Notes.undo();
          }

          return;
        }

        if (e.code === "Minus" || e.code === "NumpadSubtract") {
          e.preventDefault();

          if (!e.repeat) {
            AppState.minusActive = !AppState.minusActive;
            CanvasUI.notify(AppState.minusActive ? "Minus on" : "Minus off");
          }

          return;
        }

        const shiftAltArrow =
          e.altKey &&
          e.shiftKey &&
          (e.code === "ArrowLeft" || e.code === "ArrowRight");

        if (e.altKey && !shiftAltArrow) return;

        if (e.code === "ShiftLeft" || e.code === "ShiftRight") {
          e.preventDefault();

          if (this.shiftReleaseTimers.has(e.code)) {
            clearTimeout(this.shiftReleaseTimers.get(e.code));
            this.shiftReleaseTimers.delete(e.code);
          }

          this.heldShiftKeys.add(e.code);
          AppState.noteInput.shift = true;
          this.refreshHover(true);
          return;
        }

        if (e.code === "KeyT") {
          e.preventDefault();
          this.tonicModifierHeld = true;
          return;
        }

        if (e.code === "KeyK") {
          e.preventDefault();

          this.keySignatureModifierHeld = true;
          return;
        }

        if (e.code === "KeyZ") {
          e.preventDefault();
          this.selectionSlideHeld = true;
          return;
        }

        if (e.code === "KeyB" && !this.tonicModifierHeld) {
          e.preventDefault();

          if (!this.beamModifierHeld && !e.repeat) {
            this.activeBeamGroupId = AppState.nextBeamGroupId++;
            this.beamGroupSeeded = false;
          }

          this.beamModifierHeld = true;
          return;
        }

        if (e.code === "Space") {
          e.preventDefault();

          if (!e.repeat) {
            Notes.createBarline();
          }

          return;
        }

        if (e.code === "Backspace" || e.code === "Delete") {
          e.preventDefault();
          Notes.deleteBehindCursor();
          return;
        }

        if (e.code === "Enter" || e.code === "NumpadEnter") {
          e.preventDefault();

          if (!e.repeat) {
            Notes.applyAccidentalToActiveNote();
          }

          return;
        }

        if (this.keySignatureModifierHeld) {
          const keySigMatch = e.code.match(/^(?:Numpad|Digit)([0-7])$/);

          if (keySigMatch) {
            e.preventDefault();

            if (!e.repeat) {
              Notes.createKeySignature(
                Number(keySigMatch[1]),
                AppState.minusActive ? "flat" : "sharp"
              );
            }

            return;
          }

          if (e.code.match(/^(?:Numpad|Digit)[89]$/)) {
            e.preventDefault();
            return;
          }
        }

        if (
          e.shiftKey &&
          this.selectionSlideHeld &&
          (e.code === "ArrowLeft" || e.code === "ArrowRight")
        ) {
          e.preventDefault();
          Notes.slideSelection(e.code === "ArrowLeft" ? -1 : 1);
          return;
        }

        if (
          e.shiftKey &&
          (e.code === "ArrowLeft" || e.code === "ArrowRight")
        ) {
          e.preventDefault();
          Notes.extendSelection(
            e.code === "ArrowLeft" ? -1 : 1,
            e.altKey
          );
          return;
        }

        if (e.code === "ArrowLeft" || e.code === "ArrowRight") {
          e.preventDefault();
          Notes.moveCursor(e.code === "ArrowLeft" ? -1 : 1);
          return;
        }

        if (e.code === "ArrowUp" || e.code === "ArrowDown") {
          e.preventDefault();
          Notes.moveCursorVertical(e.code === "ArrowUp" ? -1 : 1);
          return;
        }

        if (this.tonicModifierHeld) {
          const intervalDegree = this.degreeKeyMap[e.code];
          const tonicMatch = e.code.match(/^Key([A-G])$/);

          if (intervalDegree) {
            e.preventDefault();

            if (!e.repeat) {
              Notes.transposeTonicByInterval(
                intervalDegree,
                AppState.minusActive
              );
            }

            return;
          }

          if (tonicMatch) {
            e.preventDefault();

            if (!e.repeat) {
              Notes.changeTonicLetter(tonicMatch[1]);
            }

            return;
          }
        }

        const noteValue = this.noteValueKeyMap[e.code];

        if (noteValue) {
          e.preventDefault();
          AppState.noteInput.value = noteValue;
          return;
        }

        const accidental = this.accidentalKeyMap[e.code];

        if (accidental) {
          e.preventDefault();

          if (!this.heldAccidentals.has(e.code)) {
            this.heldAccidentals.set(e.code, accidental);
          }

          AppState.noteInput.accidental = accidental;
          return;
        }

        if (e.code === "Digit0" || e.code === "Numpad0") {
          e.preventDefault();

          if (!e.repeat) {
            Notes.createRest();
          }

          return;
        }

        const degree = this.degreeKeyMap[e.code];
        if (!degree) return;

        e.preventDefault();

        if (e.repeat || this.heldDegreeKeys.has(e.code)) return;

        const leaderIsHeld =
          this.degreeChordLeader !== null &&
          this.heldDegreeKeys.has(this.degreeChordLeader);
        const addToChord =
          AppState.noteInput.shift ||
          e.shiftKey ||
          leaderIsHeld;

        if (this.heldDegreeKeys.size === 0) {
          this.degreeChordLeader = e.code;
        }

        this.heldDegreeKeys.add(e.code);
        Notes.createFromDegree(
          degree,
          addToChord
        );
      },

      keyup(e) {
        if (e.code === "ShiftLeft" || e.code === "ShiftRight") {
          e.preventDefault();

          if (this.shiftReleaseTimers.has(e.code)) {
            clearTimeout(this.shiftReleaseTimers.get(e.code));
          }

          const timer = setTimeout(() => {
            this.heldShiftKeys.delete(e.code);
            AppState.noteInput.shift = this.heldShiftKeys.size > 0
              ? true
              : AppState.noteInput.selectedShift;
            this.shiftReleaseTimers.delete(e.code);
            this.refreshHover(false);
          }, 80);

          this.shiftReleaseTimers.set(e.code, timer);

          return;
        }

        if (e.code === "KeyT") {
          e.preventDefault();
          this.tonicModifierHeld = false;
          return;
        }

        if (e.code === "KeyK") {
          e.preventDefault();
          this.keySignatureModifierHeld = false;
          return;
        }

        if (e.code === "KeyZ") {
          e.preventDefault();
          this.selectionSlideHeld = false;
          return;
        }

        if (e.code === "KeyB") {
          e.preventDefault();
          this.beamModifierHeld = false;
          this.activeBeamGroupId = null;
          this.beamGroupSeeded = false;
          return;
        }

        if (this.heldDegreeKeys.has(e.code)) {
          e.preventDefault();
          this.heldDegreeKeys.delete(e.code);

          if (e.code === this.degreeChordLeader) {
            this.degreeChordLeader = null;
          }

          if (this.heldDegreeKeys.size === 0) {
            this.degreeChordLeader = null;
          }

          return;
        }

        if (!this.heldAccidentals.has(e.code)) return;

        e.preventDefault();
        this.heldAccidentals.delete(e.code);
        this.restoreAccidental();
      },

      restoreAccidental() {
        const held = [...this.heldAccidentals.values()];

        AppState.noteInput.accidental = held.length
          ? held[held.length - 1]
          : AppState.noteInput.selectedAccidental;
      },

      isDegreeHeld(degree) {
        for (const code of this.heldDegreeKeys) {
          if (this.degreeKeyMap[code] === degree) return true;
        }

        return false;
      },

      releaseAccidentals() {
        this.tonicModifierHeld = false;
        this.keySignatureModifierHeld = false;

        for (const timer of this.shiftReleaseTimers.values()) {
          clearTimeout(timer);
        }

        this.shiftReleaseTimers.clear();

        this.heldShiftKeys.clear();
        this.selectionSlideHeld = false;
        this.beamModifierHeld = false;
        this.activeBeamGroupId = null;
        this.beamGroupSeeded = false;
        AppState.noteInput.shift = AppState.noteInput.selectedShift;
        this.heldDegreeKeys.clear();
        this.degreeChordLeader = null;
        this.heldAccidentals.clear();
        this.restoreAccidental();
        this.refreshHover(false);
      },

      down(e) {
        if (AppState.playback.enabled) {
          e.preventDefault();
          return;
        }

        canvas.setPointerCapture(e.pointerId);

        const p = this.pointer(e);
        this.updateHover(p, e.shiftKey);
        const beamHandle = this.beamHandleAtPoint(p);
        if (beamHandle) {
          const edit = Renderer.beamEdit(beamHandle.groupId);
          Notes.saveUndo();
          AppState.selectedBeamGroupId = beamHandle.groupId;
          Object.assign(AppState.input, {
            down: true,
            pointerId: e.pointerId,
            startX: p.sx,
            startY: p.sy,
            lastX: p.sx,
            lastY: p.sy,
            lastTime: performance.now(),
            dragging: true,
            activeBeamDrag: {
              groupId: beamHandle.groupId,
              handle: beamHandle.handle,
              startY: p.sy,
              leftOffset: edit.leftOffset,
              rightOffset: edit.rightOffset
            }
          });
          return;
        }

        const beam = this.beamAtPoint(p);
        if (beam) {
          AppState.selectedBeamGroupId = beam.groupId;
          AppState.input.down = true;
          AppState.input.pointerId = e.pointerId;
          AppState.input.startX = p.sx;
          AppState.input.startY = p.sy;
          AppState.input.lastX = p.sx;
          AppState.input.lastY = p.sy;
          return;
        }

        const hit = CanvasUI.hit(p.sx, p.sy);

        if (hit) {
          if (hit.type === "cursorSlider" || hit.type === "controlSlider") {
            CanvasUI.setCursorSliderValue(hit, p.sx);
            AppState.input.activeSliderId = hit.id;
          }

          AppState.input.down = true;
          AppState.input.pointerId = e.pointerId;
          AppState.input.startX = p.sx;
          AppState.input.startY = p.sy;
          AppState.input.lastX = p.sx;
          AppState.input.lastY = p.sy;
          return;
        }

        if (AppState.menu.open) {
          AppState.menu.open = null;
          AppState.menu.submenu = null;
        }

        AppState.pinch.pointers.set(e.pointerId, {
          x: e.clientX,
          y: e.clientY
        });

        if (AppState.pinch.pointers.size === 2) {
          const pts = [...AppState.pinch.pointers.values()];
          const dx = pts[1].x - pts[0].x;
          const dy = pts[1].y - pts[0].y;

          AppState.pinch.active = true;
          AppState.pinch.startDistance = Math.hypot(dx, dy);
          AppState.pinch.startZoom = AppState.camera.zoom;
          AppState.pinch.centerScreenX = (pts[0].x + pts[1].x) / 2;
          AppState.pinch.centerWorldX = this.screenToWorldX(AppState.pinch.centerScreenX);

          return;
        }

        Object.assign(AppState.input, {
          down: true,
          pointerId: e.pointerId,
          startX: p.sx,
          startY: p.sy,
          lastX: p.sx,
          lastY: p.sy,
          lastTime: performance.now(),
          dragging: false,
          didLongPress: false
        });

        AppState.camera.momentum = false;
      },

      move(e) {
        if (AppState.playback.enabled) return;

        const p = this.pointer(e);
        this.updateHover(p, e.shiftKey);

        if (AppState.pinch.pointers.has(e.pointerId)) {
          AppState.pinch.pointers.set(e.pointerId, {
            x: e.clientX,
            y: e.clientY
          });
        }

        if (AppState.pinch.active && AppState.pinch.pointers.size >= 2) {
          const pts = [...AppState.pinch.pointers.values()];
          const dx = pts[1].x - pts[0].x;
          const dy = pts[1].y - pts[0].y;
          const dist = Math.hypot(dx, dy);

          AppState.camera.zoom = Math.max(
            0.45,
            Math.min(2.8, AppState.pinch.startZoom * dist / AppState.pinch.startDistance)
          );

          AppState.camera.x =
            AppState.pinch.centerWorldX -
