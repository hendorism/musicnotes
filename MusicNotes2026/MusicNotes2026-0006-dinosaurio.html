            AppState.pinch.centerScreenX / AppState.camera.zoom;

          AppState.camera.x = Math.max(0, AppState.camera.x);
          return;
        }

        if (!AppState.input.down || AppState.input.pointerId !== e.pointerId) return;

        if (AppState.input.activeBeamDrag) {
          const drag = AppState.input.activeBeamDrag;
          const edit = Renderer.beamEdit(drag.groupId);
          const dy = p.sy - drag.startY;

          if (drag.handle === "middle") {
            edit.leftOffset = drag.leftOffset + dy;
            edit.rightOffset = drag.rightOffset + dy;
          } else if (drag.handle === "left") {
            edit.leftOffset = drag.leftOffset + dy;
          } else if (drag.handle === "right") {
            edit.rightOffset = drag.rightOffset + dy;
          }

          return;
        }

        if (AppState.input.activeSliderId) {
          const slider = CanvasUI.visibleButtons.find(
            b =>
              (b.type === "cursorSlider" || b.type === "controlSlider") &&
              b.id === AppState.input.activeSliderId
          );
          CanvasUI.setCursorSliderValue(slider, p.sx);
          return;
        }

        const totalDx = p.sx - AppState.input.startX;
        const totalDy = p.sy - AppState.input.startY;

        if (!AppState.input.dragging) {
          if (
            Math.hypot(totalDx, totalDy) > 14 &&
            Math.abs(totalDx) > Math.abs(totalDy) * 1.25
          ) {
            AppState.input.dragging = true;
            AppState.input.lastX = p.sx;
            AppState.input.lastY = p.sy;
            AppState.input.lastTime = performance.now();
          }

          return;
        }

        const dx = p.sx - AppState.input.lastX;
        const now = performance.now();
        const dt = Math.max(1, now - AppState.input.lastTime);
        const worldDx = dx / AppState.camera.zoom;

        AppState.camera.x = Math.max(0, AppState.camera.x - worldDx);
        AppState.camera.velocityX = (-worldDx) / dt;

        AppState.input.lastX = p.sx;
        AppState.input.lastY = p.sy;
        AppState.input.lastTime = now;
      },

      up(e) {
        if (AppState.playback.enabled) return;

        const p = this.pointer(e);
        this.updateHover(p, e.shiftKey);
        const hit = CanvasUI.hit(p.sx, p.sy);

        if (AppState.input.activeSliderId) {
          const slider = CanvasUI.visibleButtons.find(
            b =>
              (b.type === "cursorSlider" || b.type === "controlSlider") &&
              b.id === AppState.input.activeSliderId
          );
          CanvasUI.setCursorSliderValue(slider, p.sx);
          this.cleanup(e);
          return;
        }

        if (hit && hit.type !== "cursorSlider" && hit.type !== "controlSlider") {
          CanvasUI.activate(hit);
          this.cleanup(e);
          return;
        }

        const wasDragging = AppState.input.dragging;
        this.cleanup(e);

        if (wasDragging) {
          AppState.camera.momentum = true;
          return;
        }

        const note = this.noteheadAtPoint(p);
        if (note) {
          Notes.selectItem(note);
        }
      },

      cancel(e) {
        this.cleanup(e);
      },

      cleanup(e) {
        AppState.pinch.pointers.delete(e.pointerId);

        if (AppState.pinch.pointers.size < 2) {
          AppState.pinch.active = false;
        }

        AppState.input.down = false;
        AppState.input.pointerId = null;
        AppState.input.activeSliderId = null;
        AppState.input.activeBeamDrag = null;
      },

      wheel(e) {
        e.preventDefault();

        const p = this.pointer(e);

        if (e.ctrlKey) {
          const before = this.screenToWorldX(p.sx);

          AppState.camera.zoom *= e.deltaY < 0 ? 1.08 : 0.92;
          AppState.camera.zoom = Math.max(0.45, Math.min(2.8, AppState.camera.zoom));

          const after = this.screenToWorldX(p.sx);
          AppState.camera.x += before - after;
          AppState.camera.x = Math.max(0, AppState.camera.x);
        } else {
          AppState.camera.x = Math.max(
            0,
            AppState.camera.x + e.deltaY / AppState.camera.zoom
          );
        }
      },

      updateMomentum() {
        if (!AppState.camera.momentum) return;

        AppState.camera.x = Math.max(
          0,
          AppState.camera.x + AppState.camera.velocityX * 16
        );

        AppState.camera.velocityX *= 0.94;

        if (Math.abs(AppState.camera.velocityX) < 0.01) {
          AppState.camera.momentum = false;
        }
      },

      updateCameraFollow(dt = 16) {
        if (AppState.input.dragging || AppState.pinch.active) {
          AppState.camera.followX = AppState.camera.x;
          AppState.camera.followVelocityX = 0;
          return;
        }

        const seconds = Math.min(0.05, Math.max(0.001, dt / 1000));
        const target = Math.max(0, AppState.camera.followX || 0);
        const distance = target - AppState.camera.x;
        const acceleration = distance * 62;

        AppState.camera.followVelocityX += acceleration * seconds;
        AppState.camera.followVelocityX *= Math.pow(0.0012, seconds);

        const maxVelocity = Math.max(520, Math.abs(distance) * 10 + 180);
        AppState.camera.followVelocityX = Math.max(
          -maxVelocity,
          Math.min(maxVelocity, AppState.camera.followVelocityX)
        );

        AppState.camera.x = Math.max(
          0,
          AppState.camera.x + AppState.camera.followVelocityX * seconds
        );

        if (Math.abs(distance) < 0.35 && Math.abs(AppState.camera.followVelocityX) < 8) {
          AppState.camera.x = target;
          AppState.camera.followVelocityX = 0;
        }
      },

      smoothPanTo(targetX, duration) {
        const startX = AppState.camera.x;
        const endX = Math.max(0, targetX);
        const startTime = performance.now();

        function step(now) {
          const t = Math.min(1, (now - startTime) / duration);
          const eased = 1 - Math.pow(1 - t, 3);

          AppState.camera.x = startX + (endX - startX) * eased;

          if (t < 1) requestAnimationFrame(step);
        }

        requestAnimationFrame(step);
      }
    };

    const Renderer = {
      vexStave: null,
      vexFailed: false,

      createVexStave() {
        if (!VF || !vexContext || this.vexFailed) return null;

        return new VF.Stave(
          0,
          Layout.lineY(0) - Layout.S * 4,
          canvas.width,
          {
            left_bar: false,
            right_bar: false,
            fill_style: "black",
            spacing_between_lines_px: Layout.S
          }
        ).setContext(vexContext);
      },

      vexDefaultStaffSpacing() {
        return 10;
      },

      vexDefaultGlyphPoint() {
        return 39;
      },

      vexGlyphScale() {
        return Layout.S / this.vexDefaultStaffSpacing();
      },

      vexGlyphPoint() {
        return (
          this.vexDefaultGlyphPoint() *
          this.vexGlyphScale() *
          AppState.controls.noteheadDiameterScale
        );
      },

      vexTrebleClefPoint() {
        return this.vexGlyphPoint();
      },

      vexTrebleClef() {
        if (!VF || !vexContext || !VF.Glyph) return;

        VF.Glyph.renderGlyph(
          vexContext,
          42,
          Layout.lineY(3),
          this.vexTrebleClefPoint(),
          "gClef",
          { category: "clef_default" }
        );
      },

      notehead(sx, y, value) {
        ctx.save();
        ctx.translate(sx, y);
        ctx.rotate(-0.23);

        ctx.strokeStyle = "black";
        ctx.fillStyle = "black";
        ctx.lineWidth = 2;

        if (value === "1" || value === "1/2") {
          // hollow notehead made with bezier curves
          ctx.beginPath();
          ctx.moveTo(-8, 0);
          ctx.bezierCurveTo(-8, -5, -3, -8, 4, -6);
          ctx.bezierCurveTo(11, -4, 11, 3, 6, 6);
          ctx.bezierCurveTo(0, 9, -8, 6, -8, 0);
          ctx.closePath();
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(-3, 1);
          ctx.bezierCurveTo(-2, -2, 2, -4, 5, -3);
          ctx.bezierCurveTo(7, -2, 6, 2, 3, 4);
          ctx.bezierCurveTo(0, 5, -4, 4, -3, 1);
          ctx.fillStyle = "#bbeeff";
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.ellipse(0, 0, 7.5, 5.3, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      },

      noteheadOverlay(note, { scale = 1, alpha = 1, color = "black" } = {}) {
        const sx = Notes.noteheadScreenX(note);
        const sy = Notes.noteheadScreenY(note);

        ctx.save();
        ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
        ctx.translate(sx, sy);
        ctx.rotate(-0.23);
        ctx.scale(scale, scale);

        ctx.fillStyle = color;
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;

        if (note.value === "1" || note.value === "1/2") {
          ctx.beginPath();
          ctx.moveTo(-8, 0);
          ctx.bezierCurveTo(-8, -5, -3, -8, 4, -6);
          ctx.bezierCurveTo(11, -4, 11, 3, 6, 6);
          ctx.bezierCurveTo(0, 9, -8, 6, -8, 0);
          ctx.closePath();
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.ellipse(0, 0, 7.5, 5.3, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      },

      selectionHalo(note) {
        const amount = note.selectionAmount ?? 0;
        if (amount <= 0.001) return;

        const sx = Notes.noteheadScreenX(note);
        const sy = Notes.noteheadScreenY(note);
        const diameterScale = AppState.controls.noteheadDiameterScale;
        const selectedScale = 1 + 0.18 * amount;
        const haloRatio = 1.3;
        const noteheadRadiusX = 7.5 * diameterScale * selectedScale;
        const noteheadRadiusY = 5.3 * diameterScale * selectedScale;
        const haloRadiusX = noteheadRadiusX * haloRatio;
        const haloRadiusY = noteheadRadiusY * haloRatio;

        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(-0.23);

        ctx.globalAlpha = 0.74 * amount;
        ctx.filter = `blur(${2.8 * amount}px)`;
        ctx.fillStyle = "#72ddff";
        ctx.beginPath();
        ctx.ellipse(0, 0, haloRadiusX, haloRadiusY, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 0.92 * amount;
        ctx.filter = "none";
        ctx.strokeStyle = "rgba(128, 238, 255, 0.86)";
        ctx.lineWidth = Math.max(1.4, 2.2 * diameterScale);
        ctx.beginPath();
        ctx.ellipse(0, 0, haloRadiusX, haloRadiusY, 0, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
      },

      itemSelectionHalo(item) {
        const amount = item.selectionAmount ?? 0;
        if (amount <= 0.001) return;

        if (item.kind === "note") {
          this.selectionHalo(item);
          return;
        }

        const sx = Notes.displayScreenCenterX(item);

        ctx.save();
        ctx.globalCompositeOperation = "destination-over";
        ctx.globalAlpha = 0.78 * amount;
        ctx.filter = `blur(${2.2 * amount}px)`;
        ctx.fillStyle = "#72ddff";

        if (item.kind === "barline") {
          const top = Layout.lineY(0) - 5;
          const height = Layout.lineY(4) - Layout.lineY(0) + 10;
          ctx.beginPath();
          this.roundedRectPath(sx - 7, top, 14, height, 7);
          ctx.fill();
        } else if (item.kind === "rest") {
          const sy = item.vexRestCenterY ?? Layout.lineY(2);
          ctx.beginPath();
          ctx.ellipse(sx, sy, 16, 11, -0.18, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.ellipse(sx, Layout.lineY(2), 14, 10, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      },

      interactionOverlays() {
        const now = performance.now();

        for (const item of AppState.notes) {
          this.itemSelectionHalo(item);
        }

        const hoverNotes = Input.hoverNotes();
        if (!hoverNotes.length) return;

        const phase = ((now - AppState.hover.startedAt) % 300) / 300;
        const eased = phase < 0.5
          ? 2 * phase * phase
          : 1 - Math.pow(-2 * phase + 2, 2) / 2;

        for (const note of hoverNotes) {
          this.noteheadOverlay(note, {
            scale: eased,
            alpha: 1,
            color: "black"
          });

          this.noteheadOverlay(note, {
            scale: 1 + 0.5 * eased,
            alpha: 1 - eased,
            color: "black"
          });
        }
      },

      flag(sx, y, stemDown, value, stemLength = 44) {
        if (
          value !== "1/8" &&
          value !== "1/16" &&
          value !== "1/32" &&
          value !== "1/64"
        ) return;

        ctx.save();
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;

        const flags = {
          "1/8": 1,
          "1/16": 2,
          "1/32": 3,
          "1/64": 4
        }[value] || 0;
        const stemX = stemDown ? sx - 9 : sx + 9;

        for (let i = 0; i < flags; i++) {
          const offset = i * 9;

          ctx.beginPath();

          if (stemDown) {
            const startY = y + stemLength - offset;
            ctx.moveTo(stemX, startY);
            ctx.bezierCurveTo(
              stemX + 18, startY + 8,
              stemX + 22, startY + 22,
              stemX + 8, startY + 30
            );
          } else {
            const startY = y - stemLength + offset;
            ctx.moveTo(stemX, startY);
            ctx.bezierCurveTo(
              stemX + 18, startY + 8,
              stemX + 22, startY + 22,
              stemX + 8, startY + 30
            );
          }

          ctx.stroke();
        }

        ctx.restore();
      },

      clear() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      },

      welcomeAlpha(now = performance.now()) {
        const welcome = AppState.welcome;
        const elapsed = now - welcome.startedAt;

        if (elapsed >= welcome.fadeEndMs) return 0;
        if (elapsed <= welcome.fadeStartMs) return 1;

        return 1 -
          (elapsed - welcome.fadeStartMs) /
          (welcome.fadeEndMs - welcome.fadeStartMs);
      },

      coverImageRect(image) {
        const imageRatio = image.width / image.height;
        const canvasRatio = canvas.width / canvas.height;
        let w = canvas.width;
        let h = canvas.height;
        let x = 0;
        let y = 0;

        if (imageRatio > canvasRatio) {
          h = canvas.height;
          w = h * imageRatio;
          x = (canvas.width - w) / 2;
        } else {
          w = canvas.width;
          h = w / imageRatio;
          y = (canvas.height - h) / 2;
        }

        return { x, y, w, h };
      },

      welcomeScreen() {
        const alpha = this.welcomeAlpha();
        if (alpha <= 0) return;

        ctx.save();
        ctx.globalAlpha = alpha;

        if (
          welcomeImage &&
          AppState.welcome.imageLoaded &&
          welcomeImage.width > 0 &&
          welcomeImage.height > 0
        ) {
          const r = this.coverImageRect(welcomeImage);
          ctx.drawImage(welcomeImage, r.x, r.y, r.w, r.h);
        } else if (!AppState.welcome.imageFailed) {
          ctx.fillStyle = "#bbeeff";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        ctx.restore();
      },

      staff() {
        if (VF && !this.vexFailed) {
          try {
            this.vexStave = this.createVexStave();
            this.vexStave.draw();
            this.vexTrebleClef();
            return;
          } catch (error) {
            this.vexFailed = true;
            this.vexStave = null;
            console.error("VexFlow staff rendering failed; using Canvas fallback.", error);
          }
        }

        ctx.save();

        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;

        for (let i = 0; i < 5; i++) {
          const y = Layout.lineY(i);

          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width, y);
          ctx.stroke();
        }

        ctx.font = "90px serif";
        ctx.fillStyle = "black";
        ctx.fillText("𝄞", 45, Layout.lineY(4) + 30);

        ctx.restore();
      },

      tonicGuide() {
        const y = this.animatedTonicGuideY();

        ctx.save();
        ctx.fillStyle = "rgba(0, 255, 90, 0.16)";
        ctx.fillRect(0, y - Layout.S / 2, canvas.width, Layout.S);

        const ledgerVisibility = this.tonicLedgerVisibility(y);
        const guideLineAlpha = y >= Layout.lineY(0) && y <= Layout.lineY(4)
          ? 0.22
          : 0.22 * ledgerVisibility;

        ctx.strokeStyle = `rgba(0, 255, 90, ${guideLineAlpha})`;
        ctx.lineWidth = 2;

        for (const lineY of this.tonicGuideLineYs(y)) {
          ctx.beginPath();
          ctx.moveTo(0, lineY);
          ctx.lineTo(canvas.width, lineY);
          ctx.stroke();
        }

        ctx.restore();

        this.tonicLedgerGlints(y, this.tonicLedgerVisibility(y));
      },

      tonicTargetY() {
        return Notes.yFromPitch(
          AppState.noteInput.tonicLetter,
          AppState.noteInput.tonicOctave
        );
      },

      easeInOutCubic(t) {
        return t < 0.5
          ? 4 * t * t * t
          : 1 - Math.pow(-2 * t + 2, 3) / 2;
      },

      tonicGuideDuration(distance) {
        const octaveDistance = Layout.S / 2 * 7;
        const proportionalDuration = distance / octaveDistance * 400;

        return Math.max(
          70,
          Math.min(400, proportionalDuration)
        );
      },

      animatedTonicGuideY() {
        const animation = AppState.tonicGuideAnimation;
        const targetY = this.tonicTargetY();
        const now = performance.now();

        if (animation.toY === null || animation.displayY === null) {
          animation.fromY = targetY;
          animation.toY = targetY;
          animation.displayY = targetY;
          animation.startedAt = now;
          return targetY;
        }

        if (Math.abs(animation.toY - targetY) > 0.001) {
          animation.fromY = animation.displayY;
          animation.toY = targetY;
          animation.startedAt = now;
          animation.duration = this.tonicGuideDuration(
            Math.abs(animation.toY - animation.fromY)
          );
        }

        const t = Math.min(
          1,
          (now - animation.startedAt) / animation.duration
        );
        const eased = this.easeInOutCubic(t);

        animation.displayY =
          animation.fromY +
          (animation.toY - animation.fromY) * eased;

        if (t >= 1) {
          animation.displayY = animation.toY;
        }

        return animation.displayY;
      },

      tonicIsOnLine(y) {
        const step = Layout.S / 2;
        const unitsFromTopLine = Math.round((y - Layout.lineY(0)) / step);

        return Math.abs(y - (Layout.lineY(0) + unitsFromTopLine * step)) < 0.01 &&
          unitsFromTopLine % 2 === 0;
      },

      tonicGuideLineYs(y) {
        const top = Layout.lineY(0);
        const bottom = Layout.lineY(4);
        const step = Layout.S / 2;

        if (y >= top && y <= bottom) return [y];

        return this.tonicLedgerLineYs(y);
      },

      tonicLedgerVisibility(y) {
        const top = Layout.lineY(0);
        const bottom = Layout.lineY(4);
        const distanceOutside = y < top
          ? top - y
          : y > bottom
            ? y - bottom
            : 0;

        return Math.max(
          0,
          Math.min(1, distanceOutside / (Layout.S * 1.5))
        );
      },

      tonicLedgerLineYs(y) {
        const top = Layout.lineY(0);
        const bottom = Layout.lineY(4);
        const step = Layout.S / 2;
        const lines = [];

        if (y < top) {
          for (let lineY = top - step * 2; lineY >= y; lineY -= step * 2) {
            lines.push(lineY);
          }

          if (!this.tonicIsOnLine(y)) {
            const lastLine = lines.length ? lines[lines.length - 1] : top;
            lines.push(lastLine - step * 2);
          }
        } else if (y > bottom) {
          for (let lineY = bottom + step * 2; lineY <= y; lineY += step * 2) {
            lines.push(lineY);
          }

          if (!this.tonicIsOnLine(y)) {
            const lastLine = lines.length ? lines[lines.length - 1] : bottom;
            lines.push(lastLine + step * 2);
          }
        }

        return lines;
      },

      tonicLedgerGlints(y, visibility = 1) {
        const ledgerYs = this.tonicLedgerLineYs(y);
        if (!ledgerYs.length || visibility <= 0.001) return;

        const now = performance.now();
        const cycle = 1850;
        const phase = (now % cycle) / cycle;
        const length = 68;
        const x = phase * (canvas.width + length * 2) - length;
        const sparkle = Math.sin(phase * Math.PI);

        ctx.save();
        ctx.globalAlpha = visibility;
        ctx.lineCap = "round";
        ctx.shadowColor = "rgba(145, 255, 205, 0.75)";
        ctx.shadowBlur = 10 + sparkle * 8;

        for (const lineY of ledgerYs) {
          const gradient = ctx.createLinearGradient(x - length / 2, lineY, x + length / 2, lineY);
          gradient.addColorStop(0, "rgba(0, 255, 90, 0)");
          gradient.addColorStop(0.32, `rgba(120, 255, 205, ${0.08 + sparkle * 0.18})`);
          gradient.addColorStop(0.5, `rgba(235, 255, 245, ${0.28 + sparkle * 0.42})`);
          gradient.addColorStop(0.68, `rgba(120, 255, 205, ${0.08 + sparkle * 0.18})`);
          gradient.addColorStop(1, "rgba(0, 255, 90, 0)");

          ctx.strokeStyle = gradient;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(x - length / 2, lineY);
          ctx.lineTo(x + length / 2, lineY);
          ctx.stroke();

          ctx.strokeStyle = `rgba(0, 255, 90, ${0.05 + sparkle * 0.06})`;
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(0, lineY);
          ctx.lineTo(canvas.width, lineY);
          ctx.stroke();
        }

        ctx.restore();
      },

      ledgerLines(note, sx) {
        const top = Layout.lineY(0);
        const bottom = Layout.lineY(4);
        const step = Layout.S / 2;
        const width = 26;

        ctx.save();
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;

        // Above staff
        if (note.y < top) {
          for (let y = top - step * 2; y >= note.y; y -= step * 2) {
            ctx.beginPath();
            ctx.moveTo(sx - width / 2, y);
            ctx.lineTo(sx + width / 2, y);
            ctx.stroke();
          }
        }

        // Below staff
        if (note.y > bottom) {
          for (let y = bottom + step * 2; y <= note.y; y += step * 2) {
            ctx.beginPath();
            ctx.moveTo(sx - width / 2, y);
            ctx.lineTo(sx + width / 2, y);
            ctx.stroke();
          }
        }

        ctx.restore();
      },

      canvasBarline(barline) {
        const sx = Input.worldToScreenX(barline.drawX);
        if (sx < -20 || sx > canvas.width + 20) return;

        ctx.save();
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(sx, Layout.lineY(0));
        ctx.lineTo(sx, Layout.lineY(4));
        ctx.stroke();
        ctx.restore();
      },

      barline(barline) {
        const sx = Input.worldToScreenX(barline.drawX);
        if (sx < -20 || sx > canvas.width + 20) return;

        if (VF && this.vexStave && !this.vexFailed) {
          try {
            const vexBarline = new VF.Barline(VF.BarlineType.SINGLE);
            vexBarline.setX(sx);
            vexBarline.draw(this.vexStave);
            return;
          } catch (error) {
            console.error("VexFlow barline rendering failed; using Canvas fallback.", error);
          }
        }

        this.canvasBarline(barline);
      },

      keySignature(keySignature) {
        const sx = Input.worldToScreenX(keySignature.drawX);
        if (sx < -80 || sx > canvas.width + 80) return;

        const symbol = Notes.keySignatureSymbol[keySignature.accidental];
        const pitches = Notes.keySignaturePitches[keySignature.accidental] || [];
        const count = Math.max(0, Math.min(7, keySignature.count));

        ctx.save();
        ctx.fillStyle = "black";
        ctx.font = "30px serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        if (count === 0) {
          ctx.font = "18px sans-serif";
          ctx.fillText("C", sx, Layout.lineY(2));
          ctx.restore();
          return;
        }

        for (let i = 0; i < count; i++) {
          const [letter, octave] = pitches[i];
          ctx.fillText(
            symbol,
            sx + i * 12,
            Notes.yFromPitch(letter, octave)
          );
        }

        ctx.restore();
      },

      vexDuration(value) {
        return {
          "1": "w",
          "1/2": "h",
          "1/4": "q",
          "1/8": "8",
          "1/16": "16",
          "1/32": "32",
          "1/64": "64"
        }[value] || "q";
      },

      vexDisplayDurationForChord(notes) {
        const value = notes[0]?.value;
        const hasBeam = notes.some(note => note.beamGroupId);

        return hasBeam && Notes.isBeamableValue(value)
          ? "q"
          : this.vexDuration(value);
      },

      vexAccidental(accidental) {
        return {
          "double-flat": "bb",
          flat: "b",
          natural: "n",
          sharp: "#",
          "double-sharp": "##"
        }[accidental];
      },

      vexAccidentalModifier(accidental) {
        const modifier = new VF.Accidental(this.vexAccidental(accidental));

        if (modifier.render_options) {
          modifier.render_options.font_scale = this.vexGlyphPoint();

          if (typeof modifier.reset === "function") {
            modifier.reset();
          }
        }

        return modifier;
      },

      vexTickableCenterX(tickable) {
        const begin = typeof tickable.getNoteHeadBeginX === "function"
          ? tickable.getNoteHeadBeginX()
          : null;
        const end = typeof tickable.getNoteHeadEndX === "function"
          ? tickable.getNoteHeadEndX()
          : null;

        if (Number.isFinite(begin) && Number.isFinite(end)) {
          return (begin + end) / 2;
        }

        const boundingBox = typeof tickable.getBoundingBox === "function"
          ? tickable.getBoundingBox()
          : null;

        if (
          boundingBox &&
          Number.isFinite(boundingBox.x) &&
          Number.isFinite(boundingBox.w)
        ) {
          return boundingBox.x + boundingBox.w / 2;
        }

        return null;
      },

      vexTickableCenterY(tickable) {
        const boundingBox = typeof tickable.getBoundingBox === "function"
          ? tickable.getBoundingBox()
          : null;

        if (
          boundingBox &&
          Number.isFinite(boundingBox.y) &&
          Number.isFinite(boundingBox.h)
        ) {
          return boundingBox.y + boundingBox.h / 2;
        }

        const noteheads = tickable.noteHeads || tickable.note_heads || [];
        const headY = noteheads[0]?.y;
        return Number.isFinite(headY) ? headY : null;
      },

      centerVexTickableOnScreenX(tickable, tickContext, sx) {
        tickContext.setX(sx);

        const centerX = this.vexTickableCenterX(tickable);
        if (!Number.isFinite(centerX)) return;

        tickContext.setX(sx - (centerX - sx));
      },

      vexChord(notes) {
        const ordered = [...notes].sort((a, b) =>
          Notes.diatonicStep(a.letter, a.octave) -
          Notes.diatonicStep(b.letter, b.octave)
        );
        const sx = Input.worldToScreenX(ordered[0].drawX);
        if (sx < -80 || sx > canvas.width + 80) return;
        const stemPlan = Notes.stemPlanForChord(ordered);

        const vexNote = new VF.StaveNote({
          keys: ordered.map(note => `${note.letter.toLowerCase()}/${note.octave}`),
          duration: this.vexDisplayDurationForChord(ordered),
          clef: "treble",
          auto_stem: false,
          stem_direction: stemPlan.direction,
          glyph_font_scale: this.vexGlyphPoint(),
          stroke_px: VF.StaveNote.LEDGER_LINE_OFFSET * this.vexGlyphScale()
        });

        if (typeof vexNote.setStemLength === "function") {
          vexNote.setStemLength(stemPlan.length);
        }

        ordered.forEach((note, index) => {
          if (!note.showAccidental) return;
          vexNote.addModifier(
            this.vexAccidentalModifier(note.accidental),
            index
          );
        });

        vexNote.setStave(this.vexStave).setContext(vexContext);
        vexNote.addToModifierContext(new VF.ModifierContext());

        const tickContext = new VF.TickContext();
        tickContext.addTickable(vexNote).preFormat();
        this.centerVexTickableOnScreenX(vexNote, tickContext, sx);
        vexNote.draw();

        const noteheads = vexNote.noteHeads || vexNote.note_heads || [];
        ordered.forEach((note, index) => {
          const notehead = noteheads[index];
          if (!notehead) return;

          const displacement = notehead.displaced
            ? vexNote.getStemDirection() === 1
              ? vexNote.getRightDisplacedHeadPx()
              : -vexNote.getLeftDisplacedHeadPx()
            : 0;
          const width = typeof notehead.getWidth === "function"
            ? notehead.getWidth()
            : notehead.glyphProps?.getWidth?.() ??
            (vexNote.getNoteHeadEndX() - vexNote.getNoteHeadBeginX()) ??
            12;

          note.vexNoteheadOffsetX = notehead.x + displacement + width / 2 - sx;
          note.vexNoteheadY = notehead.y;
        });

        return vexNote;
      },

      drawVexBeam(tickables) {
        if (!VF?.Beam || tickables.length < 2) return;

        const beam = new VF.Beam(tickables);

        if (typeof beam.setContext === "function") {
          beam.setContext(vexContext);
        }

        beam.draw();
      },

      beamEdit(groupId) {
        const key = String(groupId);
        if (!AppState.beamEdits[key]) {
          AppState.beamEdits[key] = {
            leftOffset: 0,
            rightOffset: 0
          };
        }

        return AppState.beamEdits[key];
      },

      beamLineY(geometry, x) {
        if (Math.abs(geometry.rightX - geometry.leftX) < 0.001) {
          return geometry.leftY;
        }

        const t = (x - geometry.leftX) / (geometry.rightX - geometry.leftX);
        return geometry.leftY + (geometry.rightY - geometry.leftY) * t;
      },

      drawBeamStrip(x1, y1, x2, y2, thickness) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const length = Math.hypot(dx, dy);
        if (length < 0.001) return;

        const nx = -dy / length * thickness / 2;
        const ny = dx / length * thickness / 2;

        ctx.beginPath();
        ctx.moveTo(x1 + nx, y1 + ny);
        ctx.lineTo(x2 + nx, y2 + ny);
        ctx.lineTo(x2 - nx, y2 - ny);
        ctx.lineTo(x1 - nx, y1 - ny);
        ctx.closePath();
        ctx.fill();
      },

      beamGroupGeometry(groupId, entries) {
        const chords = entries
          .map(entry => entry.chord)
          .sort((a, b) => a[0].x - b[0].x);
        if (chords.length < 2) return null;

        const allNotes = chords.flat();
        const stemPlan = Notes.stemPlanForChord(allNotes);
        const direction = stemPlan.direction;
        const leftChord = chords[0];
        const rightChord = chords[chords.length - 1];
        const noteX = chord => Notes.noteheadScreenX(chord[0]);
        const leftX = noteX(leftChord) + (direction > 0 ? 9 : -9);
        const rightX = noteX(rightChord) + (direction > 0 ? 9 : -9);
        const headYForChord = chord => direction > 0
          ? Math.min(...chord.map(note => Notes.noteheadScreenY(note)))
          : Math.max(...chord.map(note => Notes.noteheadScreenY(note)));
        const leftBaseY = headYForChord(leftChord) - direction * stemPlan.length;
        const rightBaseY = headYForChord(rightChord) - direction * stemPlan.length;
        const edit = this.beamEdit(groupId);
        const leftY = leftBaseY + edit.leftOffset;
        const rightY = rightBaseY + edit.rightOffset;
        const midX = (leftX + rightX) / 2;
        const midY = (leftY + rightY) / 2;
        const maxFlags = Math.max(
          ...allNotes.map(note => Notes.flagCountForValue(note.value))
        );

        return {
          groupId,
          direction,
          chords,
          leftX,
          rightX,
          leftY,
          rightY,
          midX,
          midY,
          beamCount: Math.max(1, maxFlags)
        };
      },

      drawEditableBeamGroup(groupId, entries) {
        const geometry = this.beamGroupGeometry(groupId, entries);
        if (!geometry) return;

        const selected = AppState.selectedBeamGroupId === groupId;
        const beamThickness = 5.2;
        const beamGap = 7.5;
        const secondaryDirection = geometry.direction > 0 ? 1 : -1;

        AppState.beamRender.set(groupId, geometry);

        ctx.save();
        ctx.fillStyle = "black";
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        ctx.lineCap = "round";

        for (const chord of geometry.chords) {
          const stemX = Notes.noteheadScreenX(chord[0]) +
            (geometry.direction > 0 ? 9 : -9);
          const headY = geometry.direction > 0
            ? Math.min(...chord.map(note => Notes.noteheadScreenY(note)))
            : Math.max(...chord.map(note => Notes.noteheadScreenY(note)));
          const beamY = this.beamLineY(geometry, stemX);

          ctx.beginPath();
          ctx.moveTo(stemX, headY);
          ctx.lineTo(stemX, beamY);
          ctx.stroke();
        }

        for (let i = 0; i < geometry.beamCount; i++) {
          const offset = i * beamGap * secondaryDirection;
          this.drawBeamStrip(
            geometry.leftX,
            geometry.leftY + offset,
            geometry.rightX,
            geometry.rightY + offset,
            beamThickness
          );
        }

        if (selected) {
          const handles = [
            ["left", geometry.leftX, geometry.leftY],
            ["middle", geometry.midX, geometry.midY],
            ["right", geometry.rightX, geometry.rightY]
          ];

          ctx.fillStyle = "rgba(116, 221, 255, 0.92)";
          ctx.strokeStyle = "rgba(0, 44, 70, 0.9)";
          ctx.lineWidth = 1.5;
          ctx.shadowColor = "rgba(116, 221, 255, 0.65)";
          ctx.shadowBlur = 8;

          for (const [, x, y] of handles) {
            ctx.beginPath();
            ctx.arc(x, y, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
          }
        }

        ctx.restore();
      },

      vexRest(rest) {
        const sx = Input.worldToScreenX(rest.drawX);
        if (sx < -80 || sx > canvas.width + 80) return;

        const vexRest = new VF.StaveNote({
          keys: ["b/4"],
          duration: `${this.vexDuration(rest.value)}r`,
          clef: "treble",
          glyph_font_scale: this.vexGlyphPoint(),
          stroke_px: VF.StaveNote.LEDGER_LINE_OFFSET * this.vexGlyphScale()
        });

        vexRest.setStave(this.vexStave).setContext(vexContext);
        vexRest.addToModifierContext(new VF.ModifierContext());

        const tickContext = new VF.TickContext();
        tickContext.addTickable(vexRest).preFormat();
        this.centerVexTickableOnScreenX(vexRest, tickContext, sx);
        vexRest.draw();

        const centerX = this.vexTickableCenterX(vexRest);
        const centerY = this.vexTickableCenterY(vexRest);
        rest.vexRestOffsetX = Number.isFinite(centerX)
          ? centerX - sx
          : 0;
        rest.vexRestCenterY = Number.isFinite(centerY)
          ? centerY
          : Layout.lineY(2);
      },

      music() {
        const notes = Notes.ordered().filter(item => item.kind === "note");
        const rests = Notes.ordered().filter(item => item.kind === "rest");
        AppState.beamRender.clear();

        if (VF && this.vexStave && !this.vexFailed) {
          try {
            const chords = new Map();
            const beamGroups = new Map();

            for (const note of notes) {
              if (!chords.has(note.x)) chords.set(note.x, []);
              chords.get(note.x).push(note);
            }

            for (const chord of chords.values()) {
              const vexNote = this.vexChord(chord);
              if (!vexNote) continue;

              const beamGroupId = chord.find(note =>
                note.beamGroupId &&
                Notes.isBeamableValue(note.value)
              )?.beamGroupId;

              if (beamGroupId) {
                if (!beamGroups.has(beamGroupId)) beamGroups.set(beamGroupId, []);
                beamGroups.get(beamGroupId).push({
                  x: chord[0].x,
                  tickable: vexNote,
                  chord
                });
              }
            }

            for (const rest of rests) {
              this.vexRest(rest);
            }

            for (const entries of beamGroups.values()) {
              const sortedEntries = entries.sort((a, b) => a.x - b.x);
              this.drawEditableBeamGroup(
                sortedEntries[0].chord.find(note => note.beamGroupId)?.beamGroupId,
                sortedEntries
              );
            }

            return;
          } catch (error) {
            this.vexFailed = true;
            console.error("VexFlow note rendering failed; using Canvas fallback.", error);
          }
        }

        for (const note of notes) {
          this.note(note);
        }

        for (const rest of rests) {
          this.rest(rest);
        }
      },

      rest(rest) {
        const sx = Input.worldToScreenX(rest.drawX);
        if (sx < -80 || sx > canvas.width + 80) return;

        ctx.save();
        ctx.fillStyle = "black";
        ctx.font = "24px serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("𝄽", sx, Layout.lineY(2));
        ctx.restore();
      },

      note(note) {
        const sx = Input.worldToScreenX(note.drawX);
        if (sx < -80 || sx > canvas.width + 80) return;

        const chord = Notes.chordOf(note);
        const highest = Math.min(...chord.map(n => n.y));
        const lowest = Math.max(...chord.map(n => n.y));
        const stemPlan = Notes.stemPlanForChord(chord);
        const stemDown = stemPlan.stemDown;
        const headOffset = Notes.noteheadOffset(note, stemDown);
        const headX = sx + headOffset;
        note.vexNoteheadOffsetX = headOffset;
        note.vexNoteheadY = note.y;

        this.ledgerLines(note, headX);

        if (note.showAccidental) {
          ctx.save();
          ctx.font = "24px serif";
          ctx.fillStyle = "black";
          ctx.fillText(Notes.accidentalSymbol[note.accidental], headX - 28, note.y + 8);
          ctx.restore();
        }

        this.notehead(headX, note.y, note.value);

        const owner = Notes.stemOwner(note);

        if (owner.id === note.id && note.value !== "1") {
          ctx.save();
          ctx.strokeStyle = "black";
          ctx.lineWidth = 2;

          ctx.beginPath();

          if (stemDown) {
            ctx.moveTo(sx - 9, highest);
            ctx.lineTo(sx - 9, lowest + stemPlan.length);
          } else {
            ctx.moveTo(sx + 9, lowest);
            ctx.lineTo(sx + 9, highest - stemPlan.length);
          }

          ctx.stroke();
          ctx.restore();

          this.flag(
            sx,
            stemDown ? lowest : highest,
            stemDown,
            note.value,
            stemPlan.length
          );
        }

      },

      cursorScreenX() {
        const ordered = Notes.ordered();

        if (!ordered.length) {
          return Input.worldToScreenX(AppState.camera.x + 180);
        }

        if (AppState.cursorIndex <= 0) {
          return Input.worldToScreenX(ordered[0].layoutX - 30);
        }

        const selectedIndex = Math.min(
          AppState.cursorIndex - 1,
          ordered.length - 1
        );
        const selected = ordered[selectedIndex];

        if (selected.kind === "note") {
          return Notes.noteheadScreenX(selected);
        }

        return Notes.displayScreenCenterX(selected);
      },

      cursorScreenY() {
        const selected = Notes.activeItem();

        if (!selected) return Notes.cursorY();

        if (selected.kind === "note") {
          return Notes.noteheadScreenY(selected);
        }

        if (selected.kind === "rest") {
          return selected.vexRestCenterY ?? Layout.lineY(2);
        }

        if (selected.kind === "barline" || selected.kind === "keysig") {
          return Layout.lineY(2);
        }

        return Notes.cursorY();
      },

      cursorBladeProportions(verticalLength) {
        const wideCenter =
          verticalLength * AppState.cursorBezier.wideCenterRatio;
        const bustSize =
          verticalLength * AppState.cursorBezier.bustSizeRatio;
        const midriff =
          verticalLength * AppState.cursorBezier.midriffRatio;
        const neckCircumference =
          verticalLength * AppState.cursorBezier.neckCircumferenceRatio;

        return {
          wideCenter,
          bustSize,
          midriff,
          neckCircumference,
          wideCenterRadius: wideCenter / 2,
          bustRadius: bustSize / 2,
          midriffRadius: midriff / 2,
          neckRadius: neckCircumference / 2
        };
      },

      cursorBladePath(sx, top, bottom, proportions = null) {
        const middle = (top + bottom) / 2;
        const length = bottom - top;
        const values = proportions || this.cursorBladeProportions(length);
        const neck = values.neckRadius;
        const bust = values.bustRadius;
        const midriff = values.midriffRadius;
        const wideCenter = values.wideCenterRadius;
        const bustPosition = 0.18;
        const midriffPosition = 0.34;
        const upperBustY = top + length * bustPosition;
        const upperMidriffY = top + length * midriffPosition;
        const lowerMidriffY = bottom - length * midriffPosition;
        const lowerBustY = bottom - length * bustPosition;

        ctx.beginPath();
        ctx.moveTo(sx + neck, top);
        ctx.bezierCurveTo(
          sx + bust,
          upperBustY,
          sx + midriff,
          upperMidriffY,
          sx + wideCenter,
          middle
        );
        ctx.bezierCurveTo(
          sx + midriff,
          lowerMidriffY,
          sx + bust,
          lowerBustY,
          sx + neck,
          bottom
        );
        ctx.bezierCurveTo(
          sx - bust,
          lowerBustY,
          sx - midriff,
          lowerMidriffY,
          sx - wideCenter,
          middle
        );
        ctx.bezierCurveTo(
          sx - midriff,
          upperMidriffY,
          sx - bust,
          upperBustY,
          sx - neck,
          top
        );
        ctx.closePath();
      },

      cursorCrossPath(sx, y, length, height = 6) {
        const left = sx - length / 2;
        const right = sx + length / 2;
        const middleTop = y - height;
        const middleBottom = y + height;
        ctx.beginPath();
        ctx.moveTo(left, y);
        ctx.bezierCurveTo(
          left + length * 0.18,
          y - height * 0.12,
          sx - length * 0.18,
          middleTop,
          sx,
          middleTop
        );
        ctx.bezierCurveTo(
          sx + length * 0.18,
          middleTop,
          right - length * 0.18,
          y - height * 0.12,
          right,
          y
        );
        ctx.bezierCurveTo(
          right - length * 0.18,
          y + height * 0.12,
          sx + length * 0.18,
          middleBottom,
          sx,
          middleBottom
        );
        ctx.bezierCurveTo(
          sx - length * 0.18,
          middleBottom,
          left + length * 0.18,
          y + height * 0.12,
          left,
          y
        );
        ctx.closePath();
      },

      cursorFadeEdgeAlpha(fadeT) {
        return 1 - Math.max(0, fadeT - 0.88) / 0.12;
      },

      cursorBladeHalfWidth(y, top, bottom, proportions) {
        const t = Math.max(0, Math.min(1, (y - top) / (bottom - top)));
        const values = proportions || this.cursorBladeProportions(bottom - top);
        const neck = values.neckRadius;
        const bust = values.bustRadius;
        const midriff = values.midriffRadius;
        const wideCenter = values.wideCenterRadius;

        if (t <= 0.18) {
          return neck + (bust - neck) * (t / 0.18);
        }

        if (t <= 0.34) {
          return bust + (midriff - bust) * ((t - 0.18) / 0.16);
        }

        if (t <= 0.5) {
          return midriff + (wideCenter - midriff) * ((t - 0.34) / 0.16);
        }

        if (t <= 0.66) {
          return wideCenter + (midriff - wideCenter) * ((t - 0.5) / 0.16);
        }

        if (t <= 0.82) {
          return midriff + (bust - midriff) * ((t - 0.66) / 0.16);
        }

        return bust + (neck - bust) * ((t - 0.82) / 0.18);
      },

      cursorCrossHalfHeight(x, sx, length, maxHeight) {
        const t = Math.max(0, Math.min(1, Math.abs(x - sx) / (length / 2)));
        return maxHeight * Math.pow(1 - t, 0.72);
      },

      drawCursorBladeSegment(sx, top, bottom, y0, y1, {
        proportions,
        edgeAlpha,
        fadeFromStart = false,
        fadeFromEnd = false
      }) {
        if (y1 <= y0) return;

        const values = proportions || this.cursorBladeProportions(bottom - top);
        const maxWidth = values.wideCenterRadius;
        const cursorOpacity = 0.85;
        const startAlpha = edgeAlpha * (fadeFromStart ? 0 : 1);
        const endAlpha = edgeAlpha * (fadeFromEnd ? 0 : 1);
        const middleAlpha = Math.max(startAlpha, endAlpha) * 0.95;

        ctx.save();
        this.cursorBladePath(sx, top, bottom, values);
        ctx.clip();
        ctx.beginPath();
        ctx.rect(sx - maxWidth - 3, y0, maxWidth * 2 + 6, y1 - y0);
        ctx.clip();

        const body = ctx.createLinearGradient(sx, y0, sx, y1);
        body.addColorStop(0, `rgba(120, 8, 24, ${startAlpha * cursorOpacity * 0.88})`);
        body.addColorStop(0.42, `rgba(245, 42, 62, ${middleAlpha * cursorOpacity})`);
        body.addColorStop(0.54, `rgba(245, 255, 255, ${middleAlpha * cursorOpacity * 0.36})`);
        body.addColorStop(1, `rgba(120, 8, 24, ${endAlpha * cursorOpacity * 0.88})`);

        ctx.shadowColor = `rgba(230, 248, 255, ${cursorOpacity * (0.18 + edgeAlpha * 0.22)})`;
        ctx.shadowBlur = 7;
        ctx.fillStyle = body;
        ctx.fillRect(sx - maxWidth - 3, y0, maxWidth * 2 + 6, y1 - y0);

        const shade = ctx.createLinearGradient(sx - maxWidth, 0, sx + maxWidth, 0);
        shade.addColorStop(0, `rgba(40, 0, 14, ${middleAlpha * cursorOpacity * 0.42})`);
        shade.addColorStop(0.5, `rgba(255, 255, 255, ${middleAlpha * cursorOpacity * 0.18})`);
        shade.addColorStop(1, `rgba(40, 0, 14, ${middleAlpha * cursorOpacity * 0.42})`);
        ctx.fillStyle = shade;
        ctx.fillRect(sx - maxWidth - 3, y0, maxWidth * 2 + 6, y1 - y0);

        ctx.restore();
      },

      drawCursorCrossSegment(sx, y, length, height, x0, x1, {
        edgeAlpha,
        fadeFromStart = false,
        fadeFromEnd = false
      }) {
        if (x1 <= x0) return;

        const startAlpha = edgeAlpha * (fadeFromStart ? 0 : 1);
        const endAlpha = edgeAlpha * (fadeFromEnd ? 0 : 1);
        const middleAlpha = Math.max(startAlpha, endAlpha) * 0.95;
        const cursorOpacity = 0.85;

        ctx.save();
        this.cursorCrossPath(sx, y, length, height);
        ctx.clip();
        ctx.beginPath();
        ctx.rect(x0, y - height - 3, x1 - x0, height * 2 + 6);
        ctx.clip();

        const body = ctx.createLinearGradient(x0, y, x1, y);
        body.addColorStop(0, `rgba(120, 8, 24, ${startAlpha * cursorOpacity * 0.88})`);
        body.addColorStop(0.44, `rgba(245, 42, 62, ${middleAlpha * cursorOpacity})`);
        body.addColorStop(0.54, `rgba(245, 255, 255, ${middleAlpha * cursorOpacity * 0.38})`);
        body.addColorStop(1, `rgba(120, 8, 24, ${endAlpha * cursorOpacity * 0.88})`);

        ctx.shadowColor = `rgba(230, 248, 255, ${cursorOpacity * (0.15 + edgeAlpha * 0.2)})`;
        ctx.shadowBlur = 6;
        ctx.fillStyle = body;
        ctx.fillRect(x0, y - height - 3, x1 - x0, height * 2 + 6);

        ctx.restore();
      },

      drawCursorGlints(sx, cursorY, vertical, horizontalLength, fadeT, edgeAlpha, proportions) {
        if (fadeT <= 0.001) return;

        const crossHeight = 5.5;
        const values = proportions || this.cursorBladeProportions(vertical.length);
        const glintAlpha = Math.sin(fadeT * Math.PI) * edgeAlpha;
        if (glintAlpha <= 0.001) return;

        const verticalGap = fadeT * vertical.length * 0.58;
        const crossGap = fadeT * horizontalLength * 0.52;
        const topFront = cursorY - verticalGap;
        const bottomFront = cursorY + verticalGap;
        const leftFront = sx - crossGap;
        const rightFront = sx + crossGap;

        ctx.save();
        ctx.globalAlpha = 0.82 * glintAlpha;
        ctx.strokeStyle = "rgba(252, 255, 255, 0.96)";
        ctx.lineWidth = 1.35;
        ctx.lineCap = "round";
        ctx.shadowColor = "rgba(230, 248, 255, 0.95)";
        ctx.shadowBlur = 13;

        for (const y of [topFront, bottomFront]) {
          if (y <= vertical.top || y >= vertical.bottom) continue;
          const halfWidth = this.cursorBladeHalfWidth(y, vertical.top, vertical.bottom, values);
          if (halfWidth <= 0.4) continue;

          ctx.beginPath();
          ctx.moveTo(sx - halfWidth * 0.8, y);
          ctx.bezierCurveTo(
            sx - halfWidth * 0.28,
            y - 1.8,
            sx + halfWidth * 0.28,
            y + 1.8,
            sx + halfWidth * 0.8,
            y
          );
          ctx.stroke();
        }

        for (const x of [leftFront, rightFront]) {
          if (
            x <= sx - horizontalLength / 2 ||
            x >= sx + horizontalLength / 2
          ) continue;

          const halfHeight = this.cursorCrossHalfHeight(x, sx, horizontalLength, crossHeight);
          if (halfHeight <= 0.4) continue;

          ctx.beginPath();
          ctx.moveTo(x, cursorY - halfHeight * 0.82);
          ctx.bezierCurveTo(
            x + 1.5,
            cursorY - halfHeight * 0.28,
            x - 1.5,
            cursorY + halfHeight * 0.28,
            x,
            cursorY + halfHeight * 0.82
          );
          ctx.stroke();
        }

        ctx.restore();
      },

      cursorVerticalGeometry(cursorY) {
        const staffTop = Layout.lineY(0);
        const staffBottom = Layout.lineY(4);
        const staffCenter = (staffTop + staffBottom) / 2;
        const staffHeight = staffBottom - staffTop;
        const minimumLength = staffHeight + 50;
        const comfortLength = (staffHeight + Layout.S * 0.6) * 3;
        const verticalLength = Math.max(minimumLength, comfortLength);
        const middleThirdHalf = verticalLength / 6;
        const minCenter = cursorY - middleThirdHalf;
        const maxCenter = cursorY + middleThirdHalf;
        const center = Math.max(minCenter, Math.min(maxCenter, staffCenter));

        return {
          top: center - verticalLength / 2,
          bottom: center + verticalLength / 2,
          length: verticalLength,
          center
        };
      },

      cursor() {
        const sx = this.cursorScreenX();
        const cursorY = this.cursorScreenY();
        const selected = Notes.activeItem();
        const overItem = !!selected;
        const cursorOpacity = overItem ? 0.56 : 0.88;
        const coreOpacity = overItem ? 0.46 : 1;
        const vertical = this.cursorVerticalGeometry(cursorY);
        const verticalTop = vertical.top;
        const verticalBottom = vertical.bottom;
        const goldenRatio = (1 + Math.sqrt(5)) / 2;
        const horizontalLength = vertical.length / goldenRatio;
        const horizontalLeft = sx - horizontalLength / 2;
        const horizontalRight = sx + horizontalLength / 2;
        const now = performance.now();
        const phase = (now % 1600) / 1600;
        const pulse = 0.5 + 0.5 * Math.sin(now / 185);
        const breathe = 0.72 + pulse * 0.18;
        const verticalGlintY = verticalTop + vertical.length * phase;
        const horizontalGlintX =
          horizontalLeft + horizontalLength * ((phase + 0.42) % 1);

        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        ctx.globalAlpha = cursorOpacity;
        ctx.shadowColor = `rgba(0, 220, 255, ${overItem ? 0.34 : 0.62})`;
        ctx.shadowBlur = 18 + pulse * 8;
        ctx.strokeStyle = "rgba(33, 210, 255, 0.20)";
        ctx.lineWidth = 13;
        ctx.beginPath();
        ctx.moveTo(sx, verticalTop);
        ctx.lineTo(sx, verticalBottom);
        ctx.moveTo(horizontalLeft, cursorY);
        ctx.lineTo(horizontalRight, cursorY);
        ctx.stroke();

        ctx.shadowColor = `rgba(255, 66, 224, ${overItem ? 0.24 : 0.42})`;
        ctx.shadowBlur = 12 + pulse * 6;
        ctx.strokeStyle = "rgba(255, 68, 214, 0.16)";
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(sx, verticalTop + 8);
        ctx.lineTo(sx, verticalBottom - 8);
        ctx.moveTo(horizontalLeft + 8, cursorY);
        ctx.lineTo(horizontalRight - 8, cursorY);
        ctx.stroke();

        const verticalGradient = ctx.createLinearGradient(sx, verticalTop, sx, verticalBottom);
        verticalGradient.addColorStop(0, "rgba(80, 255, 255, 0)");
        verticalGradient.addColorStop(0.22, `rgba(40, 235, 255, ${0.48 * breathe})`);
        verticalGradient.addColorStop(0.5, `rgba(255, 255, 255, ${0.92 * breathe})`);
        verticalGradient.addColorStop(0.78, `rgba(255, 76, 218, ${0.50 * breathe})`);
        verticalGradient.addColorStop(1, "rgba(80, 255, 255, 0)");

        ctx.shadowColor = "rgba(220, 255, 255, 0.82)";
        ctx.shadowBlur = 7 + pulse * 5;
        ctx.strokeStyle = verticalGradient;
        ctx.lineWidth = 3.2;
        ctx.beginPath();
        ctx.moveTo(sx, verticalTop);
        ctx.lineTo(sx, verticalBottom);
        ctx.stroke();

        const horizontalGradient = ctx.createLinearGradient(horizontalLeft, cursorY, horizontalRight, cursorY);
        horizontalGradient.addColorStop(0, "rgba(255, 76, 218, 0)");
        horizontalGradient.addColorStop(0.25, `rgba(255, 76, 218, ${0.46 * breathe})`);
        horizontalGradient.addColorStop(0.5, `rgba(255, 255, 255, ${0.88 * breathe})`);
        horizontalGradient.addColorStop(0.75, `rgba(40, 235, 255, ${0.46 * breathe})`);
        horizontalGradient.addColorStop(1, "rgba(40, 235, 255, 0)");

        ctx.strokeStyle = horizontalGradient;
        ctx.lineWidth = 3.2;
        ctx.beginPath();
        ctx.moveTo(horizontalLeft, cursorY);
        ctx.lineTo(horizontalRight, cursorY);
        ctx.stroke();

        ctx.globalAlpha = cursorOpacity * coreOpacity;
        const ringRadius = 5.2 + pulse * 2.2;
        const ringGradient = ctx.createRadialGradient(
          sx,
          cursorY,
          1,
          sx,
          cursorY,
          ringRadius + 9
        );
        ringGradient.addColorStop(0, `rgba(255,255,255,${overItem ? 0.38 : 0.95})`);
        ringGradient.addColorStop(0.24, `rgba(80,245,255,${overItem ? 0.34 : 0.72})`);
        ringGradient.addColorStop(0.55, `rgba(255,70,220,${overItem ? 0.14 : 0.30})`);
        ringGradient.addColorStop(1, "rgba(255,70,220,0)");

        ctx.fillStyle = ringGradient;
        ctx.beginPath();
        ctx.arc(sx, cursorY, ringRadius + 9, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowColor = "rgba(255,255,255,0.96)";
        ctx.shadowBlur = 14;
        ctx.strokeStyle = `rgba(255,255,255,${(0.52 + pulse * 0.24) * (overItem ? 0.52 : 1)})`;
        ctx.lineWidth = 1.3;
        ctx.beginPath();
        ctx.arc(sx, cursorY, ringRadius, 0, Math.PI * 2);
        ctx.stroke();

        ctx.globalAlpha = (0.74 + pulse * 0.18) * cursorOpacity;
        ctx.strokeStyle = "rgba(255,255,255,0.96)";
        ctx.lineWidth = 2.1;
        ctx.shadowColor = "rgba(255,255,255,0.95)";
        ctx.shadowBlur = 16;

        ctx.beginPath();
        ctx.moveTo(sx - 6, verticalGlintY);
        ctx.lineTo(sx + 6, verticalGlintY);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(horizontalGlintX, cursorY - 6);
        ctx.lineTo(horizontalGlintX, cursorY + 6);
        ctx.stroke();

        ctx.globalAlpha = 0.38 * cursorOpacity;
        ctx.strokeStyle = "rgba(90,255,255,0.62)";
        ctx.lineWidth = 1;
        ctx.setLineDash([2, 8]);
        ctx.lineDashOffset = -phase * 28;
        ctx.beginPath();
        ctx.moveTo(sx, verticalTop);
        ctx.lineTo(sx, verticalBottom);
        ctx.moveTo(horizontalLeft, cursorY);
        ctx.lineTo(horizontalRight, cursorY);
        ctx.stroke();

        ctx.setLineDash([]);

        ctx.restore();
      },

      table() {
        const a = Layout.table;
        const ordered = Notes.ordered();
        const rowH = 24;
        const headerH = 46;
        const scrollY = AppState.tableScroll.y;

        ctx.save();

        ctx.beginPath();
        ctx.rect(a.x, a.y, a.w, a.h);
        ctx.clip();

        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.fillRect(a.x, a.y, a.w, a.h);
        ctx.fillStyle = "rgba(255,255,255,0.20)";
        ctx.fillRect(a.x, a.y + a.h / 3, a.w, a.h / 3);

        ctx.fillStyle = "black";
        ctx.font = "14px sans-serif";
        ctx.textBaseline = "middle";

        let y = a.y + 22;

        ctx.fillText("#", 12, y);
        ctx.fillText("X", 60, y);
        ctx.fillText("Pitch", 120, y);
        ctx.fillText("Acc", 190, y);
        ctx.fillText("Hz", 235, y);

        ctx.beginPath();
        ctx.rect(a.x, a.y + headerH, a.w, Math.max(0, a.h - headerH));
        ctx.clip();

        ordered.forEach((n, i) => {
          y = a.y + headerH + i * rowH + rowH / 2 - scrollY;
          if (y < a.y + headerH - rowH || y > a.y + a.h + rowH) return;

          if (Notes.isIndexSelected(i)) {
            ctx.fillStyle = "rgba(45,190,255,0.16)";
            ctx.fillRect(0, y - rowH / 2, a.w, rowH);
          }

          if (i === AppState.cursorIndex - 1) {
            ctx.fillStyle = "rgba(255,0,0,0.13)";
            ctx.fillRect(0, y - rowH / 2, a.w, rowH);
          }

          ctx.fillStyle = "black";
          ctx.fillText(i + 1, 12, y);
          ctx.fillText(Math.round(Notes.displayCenterX(n)), 60, y);

          if (n.kind === "barline") {
            ctx.fillText("Barline", 120, y);
          } else if (n.kind === "keysig") {
            const symbol = Notes.keySignatureSymbol[n.accidental];
            ctx.fillText(`Key ${n.count}${symbol}`, 120, y);
          } else if (n.kind === "rest") {
            ctx.fillText(`Rest ${n.value}`, 120, y);
          } else {
            ctx.fillText(`${n.letter}${n.octave}`, 120, y);
            ctx.fillText(Notes.accidentalSymbol[n.accidental], 190, y);
            ctx.fillText(Notes.frequency(n).toFixed(2), 235, y);
          }
        });

        ctx.restore();
      },

      inputPanel() {
        // Intentionally borderless: the controls float over the note table.
      },

      accidentalAdvisory() {
        const active = Notes.activeItem();

        if (
          !active ||
          active.kind !== "note" ||
          Input.heldAccidentals.size === 0
        ) return;

        const text = "Press Enter to apply accidental";
        const x = canvas.width / 2;
        const y = Math.max(28, Layout.lineY(0) - 48);
        const padX = 16;
        const w = Math.min(330, ctx.measureText(text).width + padX * 2);
        const h = 30;

        ctx.save();
        ctx.font = "15px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        ctx.fillStyle = "rgba(255, 255, 255, 0.88)";
        ctx.strokeStyle = "rgba(0, 0, 0, 0.28)";
        ctx.lineWidth = 1;
        ctx.shadowColor = "rgba(0, 0, 0, 0.16)";
        ctx.shadowBlur = 6;

        ctx.beginPath();
        this.roundedRectPath(x - w / 2, y - h / 2, w, h, 10);
        ctx.fill();
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(0, 0, 0, 0.82)";
        ctx.fillText(text, x, y + 0.5);
        ctx.restore();
      },

      roundedRectPath(x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);

        if (typeof ctx.roundRect === "function") {
          ctx.roundRect(x, y, w, h, radius);
          return;
        }

        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + w - radius, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
        ctx.lineTo(x + w, y + h - radius);
        ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
        ctx.lineTo(x + radius, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
      },

      button(b, active) {
        ctx.save();

        const disabled = false;
        const gradient = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);

        if (active) {
          gradient.addColorStop(0, "rgba(255, 248, 142, 0.98)");
          gradient.addColorStop(0.48, "rgba(255, 216, 74, 0.98)");
          gradient.addColorStop(1, "rgba(235, 154, 35, 0.98)");
        } else if (disabled) {
          gradient.addColorStop(0, "rgba(238, 238, 238, 0.72)");
          gradient.addColorStop(1, "rgba(198, 205, 210, 0.72)");
        } else {
          gradient.addColorStop(0, "rgba(255, 255, 255, 0.98)");
          gradient.addColorStop(0.55, "rgba(235, 248, 255, 0.96)");
          gradient.addColorStop(1, "rgba(187, 220, 240, 0.94)");
        }

        ctx.shadowColor = active
          ? "rgba(255, 214, 76, 0.46)"
          : "rgba(0, 0, 0, 0.16)";
        ctx.shadowBlur = active ? 10 : 4;
        ctx.shadowOffsetY = active ? 1 : 2;

        ctx.fillStyle = gradient;
        ctx.strokeStyle = active
          ? "rgba(120, 80, 0, 0.92)"
          : "rgba(0, 0, 0, 0.56)";
        ctx.lineWidth = active ? 2 : 1.25;

        ctx.beginPath();
        this.roundedRectPath(b.x, b.y, b.w, b.h, 11);
        ctx.fill();
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.42)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        const glintY = b.y + b.h * 0.72;
        ctx.moveTo(b.x + b.w * 0.18, glintY);
        ctx.quadraticCurveTo(
          b.x + b.w / 2,
          glintY + b.h * 0.045,
          b.x + b.w * 0.82,
          glintY
        );
        ctx.stroke();

        ctx.fillStyle = disabled
          ? "rgba(0, 0, 0, 0.34)"
          : "rgba(0, 0, 0, 0.88)";
        ctx.font = b.type === "degree" ? "30px sans-serif" : "15px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(b.label, b.x + b.w / 2, b.y + b.h / 2);

        ctx.restore();
      },

      menuBar() {
        const menuButtons = CanvasUI.visibleButtons.filter(b => b.type === "menuTitle");

        ctx.save();
        ctx.fillStyle = "#d8d8d8";
        ctx.fillRect(0, 0, canvas.width, CanvasUI.menuBarHeight);
        ctx.strokeStyle = "#ffffff";
        ctx.beginPath();
        ctx.moveTo(0, 0.5);
        ctx.lineTo(canvas.width, 0.5);
        ctx.stroke();
        ctx.strokeStyle = "#555";
        ctx.beginPath();
        ctx.moveTo(0, CanvasUI.menuBarHeight - 0.5);
        ctx.lineTo(canvas.width, CanvasUI.menuBarHeight - 0.5);
        ctx.stroke();

        ctx.font = "13px Chicago, Geneva, sans-serif";
        ctx.textBaseline = "middle";
        ctx.textAlign = "center";

        for (const b of menuButtons) {
          const active = AppState.menu.open === b.id;
          if (active) {
            ctx.fillStyle = "#000";
            ctx.fillRect(b.x, b.y + 1, b.w, b.h - 2);
            ctx.fillStyle = "#fff";
          } else {
            ctx.fillStyle = "#000";
          }
          ctx.fillText(b.label, b.x + b.w / 2, b.y + b.h / 2 + 0.5);
        }

        ctx.restore();
      },

      menuItemWidth(items) {
        ctx.save();
        ctx.font = "13px Chicago, Geneva, sans-serif";
        let width = 0;
        for (const item of items) {
          width = Math.max(width, ctx.measureText(item.label).width + (item.submenu ? 42 : 30));
        }
        ctx.restore();
        return Math.max(142, width);
      },

      menuPopup(x, y, items, parentId = null) {
        const itemH = 22;
        const w = this.menuItemWidth(items);
        const h = items.length * itemH + 6;

        ctx.save();
        ctx.fillStyle = "#f2f2f2";
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
        ctx.strokeStyle = "#fff";
        ctx.beginPath();
        ctx.moveTo(x + 1.5, y + h - 2);
        ctx.lineTo(x + 1.5, y + 1.5);
        ctx.lineTo(x + w - 2, y + 1.5);
        ctx.stroke();

        ctx.font = "13px Chicago, Geneva, sans-serif";
        ctx.textBaseline = "middle";
        ctx.textAlign = "left";

        items.forEach((item, index) => {
          const iy = y + 3 + index * itemH;
          const rect = {
            type: "menuItem",
            id: item.id,
            label: item.label,
            x,
            y: iy,
            w,
            h: itemH,
            action: item.action,
            submenu: item.submenu,
            disabled: item.disabled,
            parentId
          };
          AppState.menu.itemRects.push(rect);

          const hover = AppState.menu.hoverId === item.id || AppState.menu.submenu === item.id;
          if (hover && !item.disabled) {
            ctx.fillStyle = "#000";
            ctx.fillRect(x + 3, iy, w - 6, itemH);
          }

          ctx.fillStyle = item.disabled
            ? "#888"
            : hover
              ? "#fff"
              : "#000";

          if (item.check?.()) {
            ctx.fillText("✓", x + 8, iy + itemH / 2 + 0.5);
          }

          ctx.fillText(item.label, x + 22, iy + itemH / 2 + 0.5);

          if (item.submenu) {
            ctx.textAlign = "right";
            ctx.fillText("▶", x + w - 10, iy + itemH / 2 + 0.5);
            ctx.textAlign = "left";
          }
        });

        ctx.restore();
        return { x, y, w, h, itemH };
      },

      findMenuItemById(items, id) {
        for (const item of items) {
          if (item.id === id) return item;

          if (item.submenu) {
            const found = this.findMenuItemById(item.submenu, id);
            if (found) return found;
          }
        }

        return null;
      },

      findMenuPath(items, id, path = []) {
        for (const item of items) {
          const nextPath = [...path, item];
          if (item.id === id) return nextPath;

          if (item.submenu) {
            const found = this.findMenuPath(item.submenu, id, nextPath);
            if (found) return found;
          }
        }

        return null;
      },

      menus() {
        const menuButtons = CanvasUI.visibleButtons.filter(b => b.type === "menuTitle");
        const activeButton = menuButtons.find(b => b.id === AppState.menu.open);
        AppState.menu.itemRects = [];

        if (!activeButton) return;

        const popup = this.menuPopup(
          activeButton.x,
          CanvasUI.menuBarHeight,
          activeButton.menu.items,
          activeButton.id
        );

        const submenuPath = AppState.menu.submenu
          ? this.findMenuPath(activeButton.menu.items, AppState.menu.submenu)
          : null;

        let parentPopup = popup;

        for (const submenuItem of submenuPath || []) {
          if (!submenuItem.submenu) continue;
          const rect = AppState.menu.itemRects.find(item => item.id === submenuItem.id);
          if (rect) {
            parentPopup = this.menuPopup(
              rect.x + parentPopup.w - 1,
              rect.y - 3,
              submenuItem.submenu,
              submenuItem.id
            );
          }
        }
      },

      cursorSliderPanel(sliders) {
        if (!sliders.length) return;

        const panel = sliders.find(slider => slider.panel)?.panel;
        if (!panel) return;

        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.78)";
        ctx.strokeStyle = "rgba(0,0,0,0.42)";
        ctx.lineWidth = 1.25;

        ctx.beginPath();
        this.roundedRectPath(panel.x, panel.y, panel.size, panel.size, 12);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "black";
        ctx.font = "13px sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.fillText("Cursor Beziers", panel.x + 12, panel.y + 15);
        ctx.restore();
      },

      cursorSlider(slider) {
        const value = slider.type === "controlSlider" && slider.valuePath
          ? AppState[slider.valuePath[0]][slider.valuePath[1]]
          : AppState.cursorBezier[slider.id];
        const t = Math.max(
          0,
          Math.min(1, (value - slider.min) / (slider.max - slider.min))
        );
        const trackPad = 11;
        const trackX = slider.x + trackPad;
        const trackW = slider.w - trackPad * 2;
        const trackY = slider.y + slider.h * 0.62;
        const knobX = trackX + trackW * t;
        const active = AppState.input.activeSliderId === slider.id;

        ctx.save();
        ctx.font = "12px sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(0,0,0,0.82)";
        ctx.fillText(slider.label, slider.x, slider.y + slider.h * 0.28);

        ctx.textAlign = "right";
        ctx.fillStyle = "rgba(0,0,0,0.58)";
        const valueLabel = slider.type === "controlSlider"
          ? `${value.toFixed(2)}×`
          : `1/${(1 / value).toFixed(1)}`;
        ctx.fillText(valueLabel, slider.x + slider.w, slider.y + slider.h * 0.28);

        ctx.lineCap = "round";
        ctx.lineWidth = 5;
        ctx.strokeStyle = "rgba(0,0,0,0.18)";
        ctx.beginPath();
        ctx.moveTo(trackX, trackY);
        ctx.lineTo(trackX + trackW, trackY);
        ctx.stroke();

        ctx.strokeStyle = "rgba(255,60,80,0.74)";
        ctx.beginPath();
        ctx.moveTo(trackX, trackY);
        ctx.lineTo(knobX, trackY);
        ctx.stroke();

        ctx.fillStyle = active ? "rgba(255,245,120,0.98)" : "rgba(255,255,255,0.96)";
        ctx.strokeStyle = "rgba(0,0,0,0.72)";
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.arc(knobX, trackY, active ? 8 : 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.restore();
      },

      ui() {
        const cursorSliders = CanvasUI.visibleButtons.filter(
          b => b.type === "cursorSlider" || b.type === "controlSlider"
        );
        this.cursorSliderPanel(cursorSliders);

        for (const b of CanvasUI.visibleButtons) {
          if (b.type === "menuTitle") continue;

          if (b.type === "cursorSlider" || b.type === "controlSlider") {
            this.cursorSlider(b);
            continue;
          }

          const active =
            (b.type === "noteValue" && b.value === AppState.noteInput.value) ||
            (b.type === "degree" && Input.isDegreeHeld(b.value)) ||
            (b.id === "shift" && AppState.noteInput.shift) ||
            (b.id === "virtual-k" && Input.keySignatureModifierHeld) ||
            (b.type === "tonicDisplay" &&
              (Input.tonicModifierHeld || AppState.noteInput.tonicMenuOpen)) ||
            (b.type === "accidental" && b.value === AppState.noteInput.accidental) ||
            (b.type === "tonicLetter" && b.value === AppState.noteInput.tonicLetter) ||
            (b.type === "tonicOctave" && b.value === AppState.noteInput.tonicOctave);

          this.button(b, active);
        }

        this.menuBar();
        this.menus();
        this.tutorialTooltip();
        this.notification();
      },

      tutorialTooltip() {
        if (!AppState.tutorial.enabled || !AppState.tutorial.hoverText) return;

        const elapsed = performance.now() - AppState.tutorial.hoverStartedAt;
        if (elapsed < AppState.tutorial.delayMs) return;

        const text = AppState.tutorial.hoverText;
        const mx = AppState.hover.sx ?? canvas.width / 2;
        const my = AppState.hover.sy ?? 48;
        const padding = 10;
        const maxW = 310;
        const lineH = 17;

        ctx.save();
        ctx.font = "13px Geneva, sans-serif";
        const words = text.split(" ");
        const lines = [];
        let line = "";
        for (const word of words) {
          const next = line ? `${line} ${word}` : word;
          if (ctx.measureText(next).width > maxW && line) {
            lines.push(line);
            line = word;
          } else {
            line = next;
          }
        }
        if (line) lines.push(line);

        const w = Math.min(
          maxW + padding * 2,
          Math.max(...lines.map(l => ctx.measureText(l).width)) + padding * 2
        );
        const h = lines.length * lineH + padding * 2;
        const x = Math.max(8, Math.min(canvas.width - w - 8, mx + 14));
        const y = Math.max(CanvasUI.menuBarHeight + 8, Math.min(canvas.height - h - 8, my + 18));

        ctx.fillStyle = "rgba(255,255,210,0.96)";
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 1;
        ctx.fillRect(x, y, w, h);
        ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
        ctx.fillStyle = "#000";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        lines.forEach((l, i) => {
          ctx.fillText(l, x + padding, y + padding + i * lineH);
        });
        ctx.restore();
      },

      notification() {
        if (!AppState.notification.text) return;

        const elapsed = performance.now() - AppState.notification.startedAt;
        if (elapsed > AppState.notification.durationMs) return;

        const alpha = elapsed > AppState.notification.durationMs - 400
          ? (AppState.notification.durationMs - elapsed) / 400
          : 1;
        const text = AppState.notification.text;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = "13px Geneva, sans-serif";
        const w = ctx.measureText(text).width + 28;
        const h = 28;
        const x = canvas.width - w - 16;
        const y = CanvasUI.menuBarHeight + 12;

        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.strokeStyle = "rgba(0,0,0,0.45)";
        ctx.fillRect(x, y, w, h);
        ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
        ctx.fillStyle = "#000";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, x + w / 2, y + h / 2);
        ctx.restore();
      },

      playbackBadge() {
        if (!AppState.playback.enabled) return;

        const text = AppState.playback.playing
          ? "Playback: Playing"
          : "Playback: Paused";
        const w = 168;
        const h = 30;
        const x = canvas.width - w - 16;
        const y = CanvasUI.menuBarHeight + 48;

        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.72)";
        ctx.strokeStyle = "rgba(255,255,255,0.72)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        this.roundedRectPath(x, y, w, h, 9);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "white";
        ctx.font = "13px Geneva, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, x + w / 2, y + h / 2);
        ctx.restore();
      },

      render() {

        Layout.update();
        CanvasUI.rebuild();


        this.clear();
        this.staff();
        this.tonicGuide();
        this.accidentalAdvisory();

        this.music();
        this.interactionOverlays();

        const ordered = Notes.ordered();
        for (const item of ordered) {
          if (item.kind === "barline") this.barline(item);
          if (item.kind === "keysig") this.keySignature(item);
        }

        this.cursor();
        this.table();
        this.inputPanel();
        this.ui();
        this.playbackBadge();
        this.welcomeScreen();
      }
    };

    const Exporter = {
      download(name, type, content) {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");

        a.href = url;
        a.download = name;
        a.click();

        URL.revokeObjectURL(url);
      },

      groupedNotes() {
        const groups = [];

        for (const n of Notes.ordered().filter(item => item.kind === "note")) {
          let g = groups.find(x => x.x === n.x);

          if (!g) {
            g = { x: n.x, notes: [] };
            groups.push(g);
          }

          g.notes.push(n);
        }

        return groups;
      },

      musicXML() {
        const alter = {
          "double-flat": -2,
          flat: -1,
          natural: 0,
          sharp: 1,
          "double-sharp": 2
        };

        let xml = `<?xml version="1.0" encoding="UTF-8"?>
<score-partwise version="3.1">
<part-list>
<score-part id="P1"><part-name>Music</part-name></score-part>
</part-list>
<part id="P1">
<measure number="1">
<attributes>
<divisions>8</divisions>
<key><fifths>0</fifths></key>
<time><beats>4</beats><beat-type>4</beat-type></time>
<clef><sign>G</sign><line>2</line></clef>
</attributes>
`;

        for (const group of this.groupedNotes()) {
          group.notes.forEach((n, i) => {
            xml += `<note>\n`;

            if (i > 0) xml += `<chord/>\n`;

            xml += `<pitch>
<step>${n.letter}</step>
`;

            if (alter[n.accidental] !== 0) {
              xml += `<alter>${alter[n.accidental]}</alter>\n`;
            }

            xml += `<octave>${n.octave}</octave>
</pitch>
<duration>8</duration>
<type>quarter</type>
</note>
`;
          });
        }

        xml += `</measure></part></score-partwise>`;

        this.download("score.musicxml", "application/xml", xml);
      },

      writeVarLen(value) {
        let buffer = value & 0x7F;
        const bytes = [];

        while ((value >>= 7)) {
          buffer <<= 8;
          buffer |= ((value & 0x7F) | 0x80);
        }

        while (true) {
          bytes.push(buffer & 0xFF);

          if (buffer & 0x80) buffer >>= 8;
          else break;
        }

        return bytes;
      },

      midi() {
        const track = [];

        track.push(0x00, 0xFF, 0x51, 0x03, 0x07, 0xA1, 0x20);

        for (const group of this.groupedNotes()) {
          group.notes.forEach(n => {
            track.push(0x00, 0x90, Notes.midi(n), 100);
          });

          group.notes.forEach((n, i) => {
            track.push(
              ...(i === 0 ? this.writeVarLen(480) : [0x00]),
              0x80,
              Notes.midi(n),
              0
            );
          });
        }

        track.push(0x00, 0xFF, 0x2F, 0x00);

        const len = track.length;

        const bytes = [
          0x4D, 0x54, 0x68, 0x64,
          0x00, 0x00, 0x00, 0x06,
          0x00, 0x00,
          0x00, 0x01,
          0x01, 0xE0,
          0x4D, 0x54, 0x72, 0x6B,
          (len >> 24) & 255,
          (len >> 16) & 255,
          (len >> 8) & 255,
          len & 255,
          ...track
        ];

        this.download("score.mid", "audio/midi", new Uint8Array(bytes));
      },

      pdf() {
        alert("Exporter.pdf called");

        const dataURL = canvas.toDataURL("image/png");

        const win = window.open();

        if (win) {
          win.document.write(`
      <html>
      <body style="margin:0;background:white">
        <img src="${dataURL}" style="width:100%;display:block">
      </body>
      </html>
    `);
          win.document.close();
          return;
        }

        alert("Popup blocked. Try Chrome menu > Share > Print.");
      }




    };

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      Layout.update();
      CanvasUI.rebuild();
    }

    function animate() {
      const now = performance.now();
      const dt = now - AppState.lastFrameTime;
      AppState.lastFrameTime = now;

      Input.updateMomentum();
      Input.updateCameraFollow(dt);
      Notes.layout();
      Notes.updateTableScroll(dt);
      Notes.updateAnimation();
      Renderer.render();
      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    Input.bind();
    requestAnimationFrame(animate);
  </script>
</body>
